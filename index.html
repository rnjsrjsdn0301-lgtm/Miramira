<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRAMIRA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--p:#7B5EA7;--pd:#5C3D8F;--pl:#A688D4;--pbg:#F3EEF9;--ps:#EDE5F7;--d:#EF4444;--s:#22C55E;--t:#1e1e2e;--ts:#6b6b8a;--b:#DDD6F3;--bg:#F8F5FC;--sh:0 2px 16px rgba(123,94,167,.10);--shl:0 8px 32px rgba(123,94,167,.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}
input,textarea,button{font-family:'Noto Sans KR',sans-serif;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
/* AUTH */
#auth-screen{background:linear-gradient(160deg,var(--pbg) 0%,#fff 60%,var(--ps) 100%);align-items:center;justify-content:center;padding:24px;}
.auth-box{width:100%;max-width:420px;}
.logo-wrap{text-align:center;margin-bottom:32px;}
.auth-tabs{display:flex;background:var(--ps);border-radius:14px;padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;color:var(--p);transition:.2s;}
.auth-tab.active{background:var(--p);color:#fff;}
.auth-form{display:none;flex-direction:column;gap:13px;}
.auth-form.active{display:flex;}
.ig{display:flex;flex-direction:column;gap:5px;}
.ig label{font-size:12px;font-weight:700;color:var(--pd);letter-spacing:.4px;}
.ig input{padding:12px 14px;border:2px solid var(--b);border-radius:12px;font-size:14px;transition:.2s;background:#fff;}
.ig input:focus{outline:none;border-color:var(--p);}
.btn-p{background:var(--p);color:#fff;border:none;padding:13px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;transition:.2s;}
.btn-p:hover{background:var(--pd);}
.btn-o{background:none;border:2px solid var(--p);color:var(--p);padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-do{background:none;border:2px solid var(--d);color:var(--d);padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-f{background:var(--p);color:#fff;border:none;padding:8px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-f.ing{background:#fff;color:var(--p);border:2px solid var(--p);}
.btn-sec{background:var(--bg);color:var(--ts);border:none;padding:12px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;}
.aerr{color:var(--d);font-size:13px;text-align:center;min-height:16px;}
/* TOPBAR */
#main-screen{padding-bottom:70px;overflow-y:auto;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
.topbar-right{display:flex;align-items:center;gap:4px;}
.nb{position:relative;background:none;border:none;cursor:pointer;padding:5px;color:var(--ts);display:flex;align-items:center;}
.nb svg{width:22px;height:22px;}
.nbadge{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--d);border-radius:50%;border:2px solid #fff;display:none;}
.nbadge.on{display:block;}
/* Notification panel */
.npanel{display:none;position:fixed;top:52px;right:6px;width:310px;max-width:calc(100vw - 12px);background:#fff;border:1px solid var(--b);border-radius:14px;box-shadow:var(--shl);z-index:300;max-height:420px;overflow-y:auto;}
.npanel.open{display:block;}
.nphead{padding:12px 14px 8px;font-weight:800;font-size:13px;color:var(--pd);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b);}
.npclear{background:none;border:none;font-size:11px;color:var(--ts);cursor:pointer;font-weight:700;}
.nitem{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b);cursor:pointer;}
.nitem:last-child{border-bottom:none;}
.nitem.unread{background:var(--ps);}
.nitem-icon{font-size:18px;flex-shrink:0;}
.nitem-body{flex:1;}
.nitem-text{font-size:12px;line-height:1.4;color:var(--t);}
.nitem-text strong{color:var(--pd);}
.nitem-time{font-size:10px;color:var(--ts);margin-top:2px;}
/* STORIES */
.sw{padding:12px 0 6px;overflow-x:auto;display:flex;gap:10px;padding-left:14px;scrollbar-width:none;}
.sw::-webkit-scrollbar{display:none;}
.si{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;}
.sr{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--p),#C084FC);padding:3px;}
.sav{width:100%;height:100%;border-radius:50%;border:2px solid #fff;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:var(--p);overflow:hidden;}
.sav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sname{font-size:10px;color:var(--ts);max-width:62px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sadd{width:58px;height:58px;border-radius:50%;background:var(--ps);border:2px dashed var(--pl);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--p);}
/* FEED */
.feed{padding:6px 10px;display:flex;flex-direction:column;gap:10px;}
.pc{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--sh);border:1px solid var(--b);}
.pc.adel{border-color:#fca5a5;background:#fff5f5;}
.ph{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.pav{width:38px;height:38px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);cursor:pointer;flex-shrink:0;overflow:hidden;}
.pav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pmeta{flex:1;}
.puid{font-weight:700;font-size:13px;color:var(--pd);cursor:pointer;}
.puid:hover{text-decoration:underline;}
.pdate{font-size:10px;color:var(--ts);}
.pmore{position:relative;}
.mbtn{background:none;border:none;cursor:pointer;color:var(--ts);font-size:17px;padding:3px;border-radius:5px;}
.mbtn:hover{background:var(--ps);}
.dd{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--b);border-radius:10px;box-shadow:var(--shl);z-index:50;min-width:120px;overflow:hidden;}
.dd.open{display:block;}
.ddi{padding:9px 14px;font-size:13px;cursor:pointer;white-space:nowrap;}
.ddi:hover{background:var(--ps);color:var(--p);}
.ddi.danger{color:var(--d);}
.pcont{font-size:14px;line-height:1.6;color:var(--t);margin-bottom:10px;white-space:pre-wrap;}
.pcont.adel{color:var(--d);font-weight:700;font-size:13px;}
.rtinfo{font-size:11px;color:var(--pl);margin-bottom:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:6px 8px;background:var(--ps);border-radius:8px;}
.pacts{display:flex;border-top:1px solid var(--b);margin-top:6px;padding-top:6px;}
.abt{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 2px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--ts);border-radius:7px;font-weight:600;}
.abt:hover{background:var(--ps);color:var(--p);}
.abt.lk{color:#E91E8C;}
.abt.dk{color:var(--d);}
.abt.rk{color:var(--p);}
/* COMMENTS */
.cmsec{margin-top:10px;border-top:1px solid var(--b);padding-top:8px;display:flex;flex-direction:column;gap:7px;}
.cc{background:var(--pbg);border-radius:9px;padding:9px 11px;}
.ch{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.cav{width:26px;height:26px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--p);cursor:pointer;flex-shrink:0;overflow:hidden;}
.cav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cuid{font-weight:700;font-size:11px;color:var(--pd);cursor:pointer;}
.cuid:hover{text-decoration:underline;}
.cdate{font-size:10px;color:var(--ts);margin-left:auto;}
.ccont{font-size:12px;line-height:1.5;white-space:pre-wrap;}
.cacts{display:flex;gap:6px;margin-top:5px;}
.cabt{background:none;border:none;font-size:10px;color:var(--ts);cursor:pointer;display:flex;align-items:center;gap:2px;padding:2px 5px;border-radius:5px;font-weight:600;}
.cabt:hover{background:rgba(123,94,167,.1);color:var(--p);}
.cabt.lk{color:#E91E8C;}
.cabt.dk{color:var(--d);}
.cir{display:flex;gap:7px;align-items:flex-end;margin-top:7px;}
.cinput{flex:1;padding:8px 10px;border:2px solid var(--b);border-radius:9px;font-size:12px;resize:none;min-height:34px;max-height:70px;}
.cinput:focus{outline:none;border-color:var(--p);}
.csub{background:var(--p);color:#fff;border:none;padding:7px 12px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;}
.tcbtn{background:none;border:none;color:var(--p);font-size:11px;font-weight:700;cursor:pointer;padding:3px 0;margin-top:1px;}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--b);display:flex;z-index:100;padding:3px 0 5px;}
.nnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px;border:none;background:none;cursor:pointer;color:var(--ts);font-size:9px;font-weight:700;}
.nnbtn.active{color:var(--p);}
.nnbtn svg{width:22px;height:22px;}
.nnbtn.upbtn{background:var(--p);border-radius:14px;color:#fff;margin:2px 6px;}
/* SEARCH */
#search-screen{overflow-y:auto;}
.shdr{padding:12px;background:#fff;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:10;}
.siwrap{position:relative;}
.siwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ts);width:17px;height:17px;}
.sinput{width:100%;padding:10px 12px 10px 40px;border:2px solid var(--b);border-radius:11px;font-size:13px;background:var(--bg);}
.sinput:focus{outline:none;border-color:var(--p);background:#fff;}
.sres{padding:10px;}
.stitle{font-size:11px;font-weight:800;color:var(--p);letter-spacing:.5px;margin:8px 0 4px;}
.uri{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border-radius:11px;border:1px solid var(--b);cursor:pointer;margin-bottom:6px;}
.uri:hover{border-color:var(--pl);}
/* PROFILE */
#profile-screen{overflow-y:auto;}
.prfhdr{background:var(--p);padding:20px 14px 14px;color:#fff;}
.prfrow{display:flex;align-items:flex-end;gap:14px;margin-bottom:10px;}
.prfpic{width:76px;height:76px;border-radius:50%;border:3px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;overflow:hidden;}
.prfpic img{width:100%;height:100%;object-fit:cover;}
.prfstats{display:flex;gap:18px;flex:1;justify-content:flex-end;}
.prfstat{text-align:center;cursor:pointer;}
.prfstat-n{font-size:19px;font-weight:800;}
.prfstat-l{font-size:10px;opacity:.8;}
.prfuid{font-size:17px;font-weight:800;}
.prfnick{font-size:13px;opacity:.8;margin-top:2px;}
.prfbio{font-size:12px;opacity:.75;margin-top:5px;line-height:1.4;}
.prfacts{display:flex;gap:7px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--b);flex-wrap:wrap;align-items:center;}
.prfposts{padding:10px;}
.susbadge{background:#fef2f2;border:1px solid #fca5a5;color:var(--d);padding:3px 8px;border-radius:7px;font-size:11px;font-weight:700;display:inline-block;margin-top:6px;}
.ubadge{display:inline;font-size:14px;margin-left:3px;vertical-align:middle;}
/* STORY VIEWER */
.stv{display:none;position:fixed;inset:0;background:#000;z-index:400;flex-direction:column;}
.stv.open{display:flex;}
.stpbars{display:flex;gap:3px;padding:9px 10px 5px;}
.stpbar{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.stpfill{height:100%;background:#fff;width:0%;transition:width 5s linear;}
.stvhdr{display:flex;align-items:center;gap:9px;padding:7px 10px;}
.stvav{width:34px;height:34px;border-radius:50%;border:2px solid #fff;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);font-size:13px;overflow:hidden;}
.stvav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.stvname{color:#fff;font-weight:700;font-size:13px;flex:1;}
.stvtime{color:rgba(255,255,255,.7);font-size:11px;}
.stvcls{color:#fff;background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;}
/* Story tap zones - full height left/right halves */
.stimgwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;position:relative;user-select:none;}
.stimgwrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:7px;pointer-events:none;}
.sttap{position:absolute;top:0;bottom:0;width:40%;z-index:10;cursor:pointer;}
.sttap.left{left:0;}
.sttap.right{right:0;}
/* MODALS */
.moverlay{display:none;position:fixed;inset:0;background:rgba(30,20,50,.5);backdrop-filter:blur(3px);z-index:200;align-items:flex-end;justify-content:center;}
.moverlay.center{align-items:center;padding:14px;}
.moverlay.open{display:flex;}
.mbox{background:#fff;border-radius:18px 18px 0 0;padding:20px 18px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.moverlay.center .mbox{border-radius:18px;}
.mtitle{font-size:15px;font-weight:800;color:var(--pd);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.mcls{background:none;border:none;cursor:pointer;color:var(--ts);font-size:20px;line-height:1;padding:2px 6px;}
.macts{display:flex;gap:9px;margin-top:14px;}
.macts .btn-p{flex:1;}
.uptbtns{display:flex;gap:10px;}
.uptbtn{flex:1;padding:18px;border:2px solid var(--b);border-radius:13px;background:#fff;cursor:pointer;text-align:center;transition:.15s;}
.uptbtn:hover{border-color:var(--p);background:var(--ps);}
.uptbtn .icon{font-size:30px;margin-bottom:7px;}
.uptbtn .lbl{font-weight:700;font-size:13px;color:var(--pd);}
.mta{width:100%;padding:10px 12px;border:2px solid var(--b);border-radius:11px;font-size:13px;resize:none;min-height:90px;}
.mta:focus{outline:none;border-color:var(--p);}
.ccount{text-align:right;font-size:11px;color:var(--ts);margin-top:3px;}
.ccount.warn{color:var(--d);}
/* ADMIN */
.asec{padding:10px 14px;}
.acard{background:#fff;border-radius:13px;border:2px solid #fca5a5;padding:14px;margin-bottom:10px;}
.actitle{font-size:13px;font-weight:800;color:var(--d);margin-bottom:10px;}
.uarow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b);}
.uarow:last-child{border-bottom:none;}
.uainfo{font-size:12px;}
.uaid{font-weight:700;}
.uapw{color:var(--ts);font-size:11px;}
.tsw{position:relative;width:38px;height:20px;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:20px;cursor:pointer;transition:.2s;}
.tsl:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.tsw input:checked+.tsl{background:var(--p);}
.tsw input:checked+.tsl:before{transform:translateX(18px);}
/* POST INFO */
.pirow{display:flex;flex-direction:column;gap:9px;}
.piitem{background:var(--pbg);border-radius:9px;padding:10px 12px;}
.pilabel{font-size:10px;font-weight:800;color:var(--p);letter-spacing:.4px;margin-bottom:3px;}
.pival{font-size:13px;font-weight:600;color:var(--t);}
/* MISC */
.empty{text-align:center;padding:36px 18px;color:var(--ts);}
.empty .icon{font-size:36px;margin-bottom:7px;}
.empty p{font-size:13px;}
.phdr{display:flex;align-items:center;gap:9px;padding:13px 14px;background:var(--p);color:#fff;}
.phdr-t{font-weight:800;font-size:15px;}
.bkbtn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.flist{padding:10px;}
.fitem{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border-radius:11px;border:1px solid var(--b);cursor:pointer;margin-bottom:6px;}
.fitem:hover{border-color:var(--pl);}
.fiav{width:42px;height:42px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);overflow:hidden;}
.fiav img{width:100%;height:100%;object-fit:cover;}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--pd);color:#fff;padding:9px 18px;border-radius:11px;font-size:12px;font-weight:700;z-index:600;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.einput{width:100%;padding:8px 9px;border:2px solid var(--pl);border-radius:7px;font-size:12px;margin-top:3px;}
.einput:focus{outline:none;border-color:var(--p);}
.susp-opts{display:flex;flex-direction:column;gap:7px;}
.susp-opt{padding:11px;border:2px solid var(--b);border-radius:9px;cursor:pointer;font-weight:600;font-size:13px;text-align:center;transition:.15s;}
.susp-opt:hover{border-color:var(--d);color:var(--d);background:#fff5f5;}
.susp-di{display:flex;gap:7px;align-items:center;}
.susp-di input{flex:1;padding:9px;border:2px solid var(--b);border-radius:9px;font-size:13px;}
/* Loading spinner */
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="logo-wrap">
      <svg width="200" height="56" viewBox="0 0 340 80"><text x="8" y="60" font-family="'Nunito',sans-serif" font-weight="900" font-size="60" fill="#7B5EA7" letter-spacing="-2">MIRAMIRA</text><rect x="268" y="10" width="64" height="46" rx="7" fill="#7B5EA7"/><text x="300" y="31" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">I LOVE</text><text x="300" y="46" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">YOU</text><polygon points="288,56 300,70 312,56" fill="#7B5EA7"/></svg>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
      <div class="auth-tab" id="tab-reg" onclick="switchTab('reg')">회원가입</div>
    </div>
    <div class="auth-form active" id="form-login">
      <div class="ig"><label>아이디</label><input id="li-id" type="text" placeholder="아이디 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="ig"><label>비밀번호</label><input id="li-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="aerr" id="li-err"></div>
      <button class="btn-p" onclick="doLogin()">로그인</button>
    </div>
    <div class="auth-form" id="form-reg">
      <div class="ig"><label>아이디</label><input id="rg-id" type="text" placeholder="사용할 아이디 입력 (영문·숫자·_ 2~20자)"></div>
      <div class="ig"><label>비밀번호</label><input id="rg-pw" type="password" placeholder="비밀번호 입력"></div>
      <div class="ig"><label>가상국가 활동명</label><input id="rg-nick" type="text" placeholder="활동명 입력"></div>
      <div class="aerr" id="rg-err"></div>
      <button class="btn-p" onclick="doRegister()">회원가입</button>
    </div>
  </div>
</div>

<!-- MAIN -->

const db = getFirestore(app);

// ===== CONSTANTS =====
const ADMIN_DEF = {id:'admin',password:'admin',nickname:'관리자',bio:'MIRAMIRA 운영자',pfp:'',isAdmin:true,isSubAdmin:false,followers:[],following:[],suspended:null,notifs:[]};

// ===== LS FALLBACK =====
const ls = {
  getUsers:()=>{ try{return JSON.parse(localStorage.getItem('mm_users')||'[]');}catch(e){return[];} },
  saveUsers:a=>{ try{localStorage.setItem('mm_users',JSON.stringify(a));}catch(e){} },
  getAdmin:()=>{ try{return JSON.parse(localStorage.getItem('mm_admin')||JSON.stringify(ADMIN_DEF));}catch(e){return ADMIN_DEF;} },
  saveAdmin:u=>{ try{localStorage.setItem('mm_admin',JSON.stringify(u));}catch(e){} },
  getPosts:()=>{ try{return JSON.parse(localStorage.getItem('mm_posts')||'[]');}catch(e){return[];} },
  savePosts:a=>{ try{localStorage.setItem('mm_posts',JSON.stringify(a));}catch(e){} },
  getStories:()=>{ try{return JSON.parse(localStorage.getItem('mm_stories')||'[]');}catch(e){return[];} },
  saveStories:a=>{ try{localStorage.setItem('mm_stories',JSON.stringify(a));}catch(e){} },
};

// ===== FIRESTORE HELPERS =====
async function getU(id) {
  if(!id) return null;
  try {
    const s = await getDoc(doc(db,'users',id));
    if(s.exists()) return s.data();
    if(id==='admin'){
      await setDoc(doc(db,'users','admin'), ADMIN_DEF).catch(()=>{});
      ls.saveAdmin(ADMIN_DEF);
      return {...ADMIN_DEF};
    }
    return null;
  } catch(e) {
    if(id==='admin') return ls.getAdmin();
    return ls.getUsers().find(u=>u.id===id)||null;
  }
}
async function setU(u) {
  if(!u||!u.id) return;
  if(u.id==='admin') ls.saveAdmin(u);
  else { const arr=ls.getUsers(); const i=arr.findIndex(x=>x.id===u.id); if(i>=0)arr[i]=u; else arr.push(u); ls.saveUsers(arr); }
  try { await setDoc(doc(db,'users',u.id), u); } catch(e) {}
}
async function getAllUsers() {
  try { const s=await getDocs(collection(db,'users')); return s.docs.map(d=>d.data()).filter(u=>u.id!=='admin'); }
  catch(e) { return ls.getUsers(); }
}
async function getP(id) {
  if(!id) return null;
  try { const s=await getDoc(doc(db,'posts',id)); return s.exists()?s.data():null; }
  catch(e) { return ls.getPosts().find(p=>p.id===id)||null; }
}
async function setP(p) {
  if(!p||!p.id) return;
  const arr=ls.getPosts(); const i=arr.findIndex(x=>x.id===p.id); if(i>=0)arr[i]=p; else arr.unshift(p); ls.savePosts(arr);
  try { await setDoc(doc(db,'posts',p.id), p); } catch(e) {}
}
async function delP(id) {
  if(!id) return;
  ls.savePosts(ls.getPosts().filter(p=>p.id!==id));
  try { await deleteDoc(doc(db,'posts',id)); } catch(e) {}
}
async function getAllPosts() {
  try {
    const s = await getDocs(query(collection(db,'posts'), orderBy('createdAt','desc')));
    if(s.docs.length) return s.docs.map(d=>d.data());
  } catch(e) {}
  return ls.getPosts().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
}
async function getAllStories() {
  try { const s=await getDocs(collection(db,'stories')); return s.docs.map(d=>d.data()); }
  catch(e) { return ls.getStories(); }
}
async function setS(s) {
  ls.saveStories([...ls.getStories(), s]);
  try { await setDoc(doc(db,'stories',s.id), s); } catch(e) {}
}
async function delS(id) {
  ls.saveStories(ls.getStories().filter(s=>s.id!==id));
  try { await deleteDoc(doc(db,'stories',id)); } catch(e) {}
}
async function cleanStories() {
  const now=Date.now();
  const all=await getAllStories();
  for(const s of all){
    const t=tsToMs(s.createdAt);
    if(now-t>=86400000) await delS(s.id);
  }
}

// ===== STORAGE =====
async function uploadImage(dataURL, path) {
  try {
    const r = sRef(storage, path);
    const snap = await uploadString(r, dataURL, 'data_url');
    return await getDownloadURL(snap.ref);
  } catch(e) {
    return dataURL; // fallback: use base64 directly
  }
}

// ===== STATE =====
let CU = null;
let curScreen = 'main';
let editPid = null, editCid = null;
let susTgt = null;
let svStories = [], svIdx = 0, svTimer = null;
let storyDataURL = null, newPfpURL = null;
let feedUnsub = null;
let isRendering = false; // guard against snapshot loop

// ===== UTILS =====
function tsToMs(ts) {
  if(!ts) return 0;
  if(typeof ts === 'number') return ts;
  if(ts.seconds) return ts.seconds * 1000;
  return 0;
}
function uid2init(id){ return String(id||'?').substring(0,2).toUpperCase(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts){
  const t = tsToMs(ts);
  if(!t) return '';
  const d = Date.now()-t;
  if(d<60000) return '방금 전';
  if(d<3600000) return Math.floor(d/60000)+'분 전';
  if(d<86400000) return Math.floor(d/3600000)+'시간 전';
  const dd=new Date(t); return `${dd.getFullYear()}.${dd.getMonth()+1}.${dd.getDate()}`;
}
function fmtDateFull(ts){
  const t = tsToMs(ts);
  if(!t) return '알 수 없음';
  const d=new Date(t);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function gid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function getBrowser(){
  const ua=navigator.userAgent;
  if(ua.includes('Edg')) return 'Edge';
  if(ua.includes('Chrome')) return 'Chrome';
  if(ua.includes('Firefox')) return 'Firefox';
  if(ua.includes('Safari')) return 'Safari';
  return '기타';
}
function isSus(u){
  if(!u||!u.suspended) return false;
  if(u.suspended.type==='perm') return true;
  if(u.suspended.type==='days') return Date.now()<u.suspended.until;
  return false;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function OM(id){ const el=document.getElementById(id); if(el) el.classList.add('open'); }
function CM(id){ const el=document.getElementById(id); if(el) el.classList.remove('open'); }
function showScr(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(n+'-screen');
  if(el) el.classList.add('active');
  curScreen=n;
}

// ===== NOTIFICATIONS (Firestore-backed, per-user) =====
// Stored in user doc as u.notifs array
function getNs(){ return (CU&&CU.notifs)||[]; }
async function pushN(targetId, icon, text) {
  if(!targetId) return;
  try {
    const u = await getU(targetId);
    if(!u) return;
    const n = {id:gid(), icon, text, t:Date.now(), u:true};
    u.notifs = u.notifs||[];
    u.notifs.unshift(n);
    if(u.notifs.length>60) u.notifs.length=60;
    await setU(u);
    // If it's our own notification, update CU cache
    if(CU && targetId===CU.id){ CU.notifs=u.notifs; updNBadge(); }
  } catch(e) {}
}
function updNBadge(){
  const ns=getNs();
  const badge=document.getElementById('nbadge');
  if(badge) badge.classList.toggle('on', ns.some(n=>n.u));
}

// ===== AUTH =====
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  document.getElementById('form-login').classList.toggle('active',t==='login');
  document.getElementById('form-reg').classList.toggle('active',t==='reg');

async function doLogin(){
  const id=document.getElementById('li-id').value.trim();
  const pw=document.getElementById('li-pw').value;
  const err=document.getElementById('li-err');
  err.textContent='';
  if(!id||!pw){err.textContent='아이디와 비밀번호를 입력하세요.';return;}
  err.innerHTML='<span class="spin"></span> 로그인 중...';
  try {
    const u=await getU(id);
    if(!u||u.password!==pw){err.textContent='아이디 또는 비밀번호가 틀렸습니다.';return;}
    CU=u; localStorage.setItem('mm_cur',id); err.textContent='';
    await enterApp();
  } catch(e) { err.textContent='오류: '+e.message; }
}
async function doRegister(){
  const id=document.getElementById('rg-id').value.trim();
  const pw=document.getElementById('rg-pw').value;
  const nick=document.getElementById('rg-nick').value.trim();
  const err=document.getElementById('rg-err');
  err.textContent='';
  if(!id||!pw||!nick){err.textContent='모든 항목을 입력하세요.';return;}
  if(id==='admin'){err.textContent='사용할 수 없는 아이디입니다.';return;}
  if(!/^[a-zA-Z0-9_]{2,20}$/.test(id)){err.textContent='아이디: 영문·숫자·_ 2~20자만 가능합니다.';return;}
  err.innerHTML='<span class="spin"></span> 처리 중...';
  const ex=await getU(id);
  if(ex){err.textContent='이미 사용 중인 아이디입니다.';return;}
  const nu={id,password:pw,nickname:nick,bio:'',pfp:'',isAdmin:false,isSubAdmin:false,followers:[],following:[],suspended:null,notifs:[]};
  await setU(nu);
  toast('회원가입 완료! 로그인하세요.'); switchTab('login');
  document.getElementById('li-id').value=id; err.textContent='';
}
function doLogout(){
  CU=null; localStorage.removeItem('mm_cur');
  if(feedUnsub){ feedUnsub(); feedUnsub=null; }
  document.getElementById('bnav').style.display='none';

// ===== APP =====
async function enterApp(){

  document.getElementById('topbar-uid').textContent=CU.id;

function startFeedListener(){
  if(feedUnsub){ feedUnsub(); feedUnsub=null; }
  try {
    feedUnsub = onSnapshot(

// ===== FEED =====
async function renderFeed(){
  isRendering=true;
  try {
    await renderStories();
    let posts=(await getAllPosts()).filter(p=>!p.isDeleted);
    posts.sort((a,b)=>{
      const at=tsToMs(a.createdAt), bt=tsToMs(b.createdAt);
      const af=(CU.following||[]).includes(a.authorId)?1:0;
      const bf=(CU.following||[]).includes(b.authorId)?1:0;
      if(bf!==af) return bf-af; return bt-at;
    });
    const feed=document.getElementById('feed');
    if(!posts.length){feed.innerHTML='<div class="empty"><div class="icon">✨</div><p>아직 게시물이 없어요</p></div>';return;}
    const htmls=await Promise.all(posts.map(p=>buildPost(p)));
    feed.innerHTML=htmls.join('');
  } finally { isRendering=false; }
}
async function renderStories(){
  await cleanStories();
  const all=await getAllStories();
  const byU={};
  all.forEach(s=>{ if(!byU[s.authorId])byU[s.authorId]=[]; byU[s.authorId].push(s); });
  let h=`<div class="si"><div class="sadd" onclick="openStoryM()">+</div><div class="sname">내 스토리</div></div>`;
  const ord=Object.keys(byU).sort((a,b)=>((CU.following||[]).includes(b)?1:0)-((CU.following||[]).includes(a)?1:0));
  for(const uid of ord){
    const u=await getU(uid); if(!u) continue;
    const av=u.pfp?`<img src="${u.pfp}" alt="">`:`<span>${uid2init(uid)}</span>`;
    h+=`<div class="si" onclick="viewStory('${uid}')"><div class="sr"><div class="sav">${av}</div></div><div class="sname">${esc(uid)}</div></div>`;
  }
  document.getElementById('sw').innerHTML=h;
}

async function buildPost(post){
  const author=await getU(post.authorId);
  const id=post.authorId;
  const ts=tsToMs(post.createdAt);
  const likes=post.likes||[]; const dislikes=post.dislikes||[]; const retweets=post.retweets||[]; const comments=post.comments||[];
  const isOwn=CU.id===id; const isAd=CU.isAdmin||CU.isSubAdmin; const sus=isSus(CU);
  const badge=author&&author.badge?`<span class="ubadge">${esc(author.badge)}</span>`:'';
  const pfp=author&&author.pfp?`<img src="${author.pfp}" alt="">`:`<span style="font-size:15px;">${uid2init(id)}</span>`;

  // ⋯ 메뉴: 본인 = 수정/삭제, admin/subadmin = 게시물 정보(+관리자삭제+글숨기기)
  let more='';
  if(isOwn&&!post.adminDeleted&&!post.hiddenByAdmin){
    more=`<div class="pmore"><button class="mbtn" onclick="toggleDD('dd-${post.id}')">⋯</button><div class="dd" id="dd-${post.id}">
      <div class="ddi" onclick="editPost('${post.id}');toggleDD('dd-${post.id}')">수정</div>
      <div class="ddi danger" onclick="delPost('${post.id}',false);toggleDD('dd-${post.id}')">삭제</div>
    </div></div>`;
  } else if(isOwn&&post.hiddenByAdmin){
    // 숨김당한 본인: 삭제만 가능
    more=`<div class="pmore"><button class="mbtn" onclick="toggleDD('dd-${post.id}')">⋯</button><div class="dd" id="dd-${post.id}">
      <div class="ddi danger" onclick="delPost('${post.id}',false);toggleDD('dd-${post.id}')">삭제</div>
    </div></div>`;
  } else if(isAd&&!post.adminDeleted){
    more=`<div class="pmore"><button class="mbtn" onclick="toggleDD('dd-${post.id}')">⋯</button><div class="dd" id="dd-${post.id}">
      <div class="ddi" onclick="showPInfo('${post.id}');toggleDD('dd-${post.id}')">📋 게시물 정보</div>
      <div class="ddi" style="color:#E68000;" onclick="hidePost('${post.id}');toggleDD('dd-${post.id}')">${post.hiddenByAdmin?'숨김 해제':'글 숨기기'}</div>
      ${!isOwn?`<div class="ddi danger" onclick="delPost('${post.id}',true);toggleDD('dd-${post.id}')">관리자 삭제</div>`:''}
    </div></div>`;
  }

  // 리트윗 정보
  let rtInfo='';
  if(post.retweetOf){
    const orig=await getP(post.retweetOf);
    const oa=orig?orig.authorId:'(삭제됨)';
    rtInfo=`<div class="rtinfo">🔁 <strong>${esc(id)}</strong>님이 <strong>@${esc(oa)}</strong>의 글을 리트윗했습니다${orig?` <button onclick="scrollToPost('${post.retweetOf}')" style="background:#fff;border:1px solid var(--pl);border-radius:5px;padding:1px 7px;font-size:10px;font-weight:700;color:var(--p);cursor:pointer;margin-left:4px;">원본 보기</button>`:''}
    </div>`;
  }

  // 내용
  let cont='';
  if(post.adminDeleted) cont=`<div class="pcont adel">🚫 운영약관을 위반한 게시물이 삭제되었습니다</div>`;
  else if(post.hiddenByAdmin) cont=`<div class="pcont adel">🔴 이용방침을 위반하여 삭제된 게시글입니다</div>`;
  else cont=`<div class="pcont">${esc(post.content)}</div>`;

  // 액션
  let acts='';
  if(!post.adminDeleted){
    if(isOwn||sus){
      acts=`<div class="pacts"><button class="abt" onclick="toggleCm('${post.id}')">💬 ${comments.length}</button><span class="abt" style="cursor:default;">👍 ${likes.length}</span><span class="abt" style="cursor:default;">👎 ${dislikes.length}</span></div>`;
    } else {
      acts=`<div class="pacts">
        <button class="abt" onclick="toggleCm('${post.id}')">💬 ${comments.length}</button>
        <button class="abt${retweets.includes(CU.id)?' rk':''}" onclick="doRetweet('${post.id}')">🔁 ${retweets.length}</button>
        <button class="abt${likes.includes(CU.id)?' lk':''}" onclick="doLike('${post.id}')">👍 ${likes.length}</button>
        <button class="abt${dislikes.includes(CU.id)?' dk':''}" onclick="doDislike('${post.id}')">👎 ${dislikes.length}</button>
      </div>`;
    }
  }

  return `<div class="pc${post.adminDeleted?' adel':''}" id="pc-${post.id}">
    ${rtInfo}
    <div class="ph">
      <div class="pav" onclick="goProfile('${id}')">${pfp}</div>
      <div class="pmeta">
        <div class="puid" onclick="goProfile('${id}')">${esc(id)}${badge}</div>
        <div class="pdate">${fmtDate(ts)}</div>
      </div>
      ${more}
    </div>
    ${cont}${acts}${buildCommentsSec(post)}
  </div>`;
}

function buildCommentsSec(post){
  if(post.adminDeleted||post.isDeleted) return '';
  const sus=isSus(CU);
  const comments=post.comments||[];
  const cHtmls=comments.map(c=>buildComment(post.id,c)).join('');
  const inp=!sus?`<div class="cir"><textarea class="cinput" id="ci-${post.id}" rows="1" placeholder="댓글 달기..." oninput="arta(this)"></textarea><button class="csub" onclick="submitCm('${post.id}')">등록</button></div>`:'';
  return `<div class="cmsec" id="cm-${post.id}" style="display:none;">${cHtmls}${inp}</div><button class="tcbtn" onclick="toggleCm('${post.id}')">💬 댓글 ${comments.length}개${comments.length?' 보기/숨기기':''}</button>`;
}

function buildComment(pid,c){
  const isOwn=CU.id===c.authorId; const isAd=CU.isAdmin||CU.isSubAdmin; const sus=isSus(CU);
  const lk=c.likes||[]; const dk=c.dislikes||[]; const rt=c.retweets||[];
  let acts='';
  if(!sus){
    acts=`<button class="cabt${lk.includes(CU.id)?' lk':''}" onclick="cmLike('${pid}','${c.id}')">👍 ${lk.length}</button>
    <button class="cabt${dk.includes(CU.id)?' dk':''}" onclick="cmDislike('${pid}','${c.id}')">👎 ${dk.length}</button>
    <button class="cabt${rt.includes(CU.id)?' rk':''}" onclick="cmRetweet('${pid}','${c.id}')">🔁 ${rt.length}</button>`;
  }
  if(isOwn) acts+=`<button class="cabt" onclick="editCm('${pid}','${c.id}')">수정</button><button class="cabt" style="color:var(--d);" onclick="delCm('${pid}','${c.id}',false)">삭제</button>`;
  else if(isAd) acts+=`<button class="cabt" style="color:var(--d);" onclick="delCm('${pid}','${c.id}',true)">관리자삭제</button>`;
  const cav=(()=>{ const u=c.authorId; return `<span>${uid2init(u)}</span>`; })();
  return `<div class="cc" id="cc-${c.id}">
    <div class="ch">
      <div class="cav" onclick="goProfile('${c.authorId}')">${cav}</div>
      <div class="cuid" onclick="goProfile('${c.authorId}')">${esc(c.authorId)}</div>
      <div class="cdate">${fmtDate(c.createdAt)}</div>
    </div>
    <div class="ccont">${esc(c.content)}</div>
    <div class="cacts">${acts}</div>
  </div>`;
}

async function refreshPost(pid){

async function doLike(pid){
  const p=await getP(pid); if(!p) return;
  p.likes=p.likes||[]; p.dislikes=p.dislikes||[];
  const had=p.likes.includes(CU.id);
  if(had) p.likes=p.likes.filter(x=>x!==CU.id);
  else{ p.likes.push(CU.id); p.dislikes=p.dislikes.filter(x=>x!==CU.id); }
  await setP(p);
  if(!had&&p.authorId!==CU.id) await pushN(p.authorId,'👍',`<strong>${CU.id}</strong>님이 회원님의 게시물을 좋아합니다.`);
  await refreshPost(pid);
}
async function doDislike(pid){
  const p=await getP(pid); if(!p) return;
  p.dislikes=p.dislikes||[]; p.likes=p.likes||[];
  const had=p.dislikes.includes(CU.id);
  if(had) p.dislikes=p.dislikes.filter(x=>x!==CU.id);
  else{ p.dislikes.push(CU.id); p.likes=p.likes.filter(x=>x!==CU.id); }
  await setP(p);
  if(!had&&p.authorId!==CU.id) await pushN(p.authorId,'👎',`<strong>${CU.id}</strong>님이 회원님의 게시물을 싫어합니다.`);
  await refreshPost(pid);
}
async function doRetweet(pid){
  const allP=await getAllPosts(); const pIdx=allP.findIndex(p=>p.id===pid); if(pIdx<0) return;
  const p=allP[pIdx]; p.retweets=p.retweets||[];
  if(p.retweets.includes(CU.id)){
    p.retweets=p.retweets.filter(x=>x!==CU.id); await setP(p);
    const myRt=allP.find(r=>r.retweetOf===pid&&r.authorId===CU.id);
    if(myRt) await delP(myRt.id);
    await renderFeed(); toast('리트윗을 취소했습니다.'); return;
  }
  p.retweets.push(CU.id); await setP(p);
  // 게시자에게 알림
  if(p.authorId!==CU.id) await pushN(p.authorId,'🔁',`<strong>${CU.id}</strong>님이 회원님의 게시물을 리트윗했습니다.`);
  // 내 팔로워에게 알림
  for(const fid of (CU.following||[])) if(fid!==CU.id) await pushN(fid,'🔁',`<strong>${CU.id}</strong>님이 새 리트윗을 올렸습니다.`);
  const rp={id:gid(),authorId:CU.id,content:p.content,createdAt:Date.now(),likes:[],dislikes:[],retweets:[],comments:[],retweetOf:pid,browser:getBrowser()};
  await setP(rp);
  await renderFeed(); toast('리트윗했습니다!');
}

  const bars=document.getElementById('stpbars');
  bars.innerHTML=svStories.map((_,i)=>`<div class="stpbar"><div class="stpfill" id="spf-${i}"></div></div>`).join('');
  for(let i=0;i<idx;i++){ const f=document.getElementById('spf-'+i); if(f)f.style.width='100%'; }
  if(svTimer) clearInterval(svTimer);
  const fill=document.getElementById('spf-'+idx); let pct=0;
  svTimer=setInterval(()=>{
    pct+=1; if(fill)fill.style.width=pct+'%';
    if(pct>=100){ clearInterval(svTimer); svIdx++; if(svIdx<svStories.length)showSTV(svIdx); else closeSTV(); }
  },50);
}
async function deleteMyStory(sid){
  if(!confirm('스토리를 삭제하시겠습니까?')) return;
  await delS(sid);
  svStories=svStories.filter(s=>s.id!==sid);
  if(svStories.length===0){ closeSTV(); await renderStories(); toast('스토리가 삭제되었습니다.'); return; }
  if(svIdx>=svStories.length) svIdx=svStories.length-1;
  await showSTV(svIdx); await renderStories(); toast('스토리가 삭제되었습니다.');
}
function closeSTV(){ if(svTimer)clearInterval(svTimer); document.getElementById('stv').classList.remove('open'); }
function storySkip(d){
  if(svTimer) clearInterval(svTimer);
  if(d===-1){ if(svIdx>0){svIdx--;showSTV(svIdx);}else closeSTV(); }
  else{ if(svIdx<svStories.length-1){svIdx++;showSTV(svIdx);}else closeSTV(); }
}

// ===== SEARCH =====
async function doSearch(){
  const q=document.getElementById('sinput').value.trim().toLowerCase();
  const res=document.getElementById('sres');
  if(!q){res.innerHTML='<div class="empty"><div class="icon">🔍</div><p>검색어를 입력하세요</p></div>';return;}
  const users=[await getU('admin'),...(await getAllUsers())].filter(Boolean);
  const mu=users.filter(u=>u.id.toLowerCase().includes(q)||(u.nickname||'').toLowerCase().includes(q));
  const posts=(await getAllPosts()).filter(p=>!p.adminDeleted&&!p.isDeleted&&(p.content||'').toLowerCase().includes(q));
  let h='';
  if(mu.length){
    h+=`<div class="stitle">👤 사용자</div>`;
    h+=mu.map(u=>{
      const pf=u.pfp?`<img src="${u.pfp}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;">`:`<div style="width:42px;height:42px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);">${uid2init(u.id)}</div>`;
      const badge=u.badge?`<span class="ubadge">${esc(u.badge)}</span>`:'';
      return `<div class="uri" onclick="goProfile('${u.id}')">${pf}<div><div style="font-weight:700;font-size:13px;">${esc(u.id)}${badge}</div><div style="font-size:11px;color:var(--ts);">${esc(u.nickname)}</div></div></div>`;
    }).join('');
  }
  if(posts.length){
    h+=`<div class="stitle">📝 게시물</div>`;
    const ph=await Promise.all(posts.map(p=>buildPost(p)));
    h+=ph.join('');
  }
  if(!mu.length&&!posts.length) h='<div class="empty"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>';
  res.innerHTML=h;
}
function scrollToPost(pid){
  navTo('main');
  setTimeout(async()=>{
    const el=document.getElementById('pc-'+pid);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='2px solid var(--p)'; setTimeout(()=>el.style.outline='',1800); }
    else toast('원본 게시물을 찾을 수 없습니다.');
  },300);
}

// ===== PROFILE =====
async function renderProfile(uid){
  const pc=document.getElementById('prcontent');
  pc.innerHTML='<div class="empty" style="padding:40px;"><div class="spin" style="width:28px;height:28px;border-width:3px;"></div></div>';
  const u=await getU(uid);
  if(!u){pc.innerHTML='<div class="empty"><p>사용자를 찾을 수 없습니다</p></div>';return;}
  const isSelf=CU.id===uid; const isAd=CU.isAdmin||CU.isSubAdmin;
  const pfp=u.pfp?`<img src="${u.pfp}" alt="">`:`<span style="font-size:26px;">${uid2init(uid)}</span>`;
  const fol=u.followers||[]; const fing=u.following||[];
  const isF=(CU.following||[]).includes(uid);
  let susBadge='';
  if(u.suspended){
    if(u.suspended.type==='perm') susBadge='<div class="susbadge">🚫 영구정지</div>';
    else if(u.suspended.type==='days'&&Date.now()<u.suspended.until) susBadge=`<div class="susbadge">⏸ ${Math.ceil((u.suspended.until-Date.now())/86400000)}일 정지 중</div>`;
  }
  const badge=u.badge?`<span class="ubadge">${esc(u.badge)}</span>`:'';

  let acts='';
  if(isSelf){
    acts=`<div class="prfacts">
      <button class="btn-o" onclick="openPE()">프로필 수정</button>
      ${CU.isAdmin?`<button class="btn-p" style="font-size:12px;" onclick="openAdmin()">관리자설정</button>`:''}
      ${CU.isSubAdmin&&!CU.isAdmin?`<button class="btn-p" style="font-size:12px;" onclick="openAdmin()">부관리자설정</button>`:''}
      <button class="btn-o" style="margin-left:auto;" onclick="doLogout()">로그아웃</button>
    </div>`;
  } else {
    // 관리자: 정지 + 인증배지 버튼
    const adBtns=isAd?`
      <button class="btn-do" onclick="openSusMod('${uid}')">정지 설정</button>
      ${CU.isAdmin?`<button class="btn-p" style="font-size:12px;" onclick="openBadgeMod('${uid}')">🏅 인증배지</button>`:''}
    `:'';
    acts=`<div class="prfacts">
      <button class="btn-f ${isF?'ing':''}" onclick="doFollow('${uid}')">${isF?'팔로잉':'팔로우'}</button>
      ${adBtns}
    </div>`;
  }

  const posts=(await getAllPosts()).filter(p=>p.authorId===uid&&!p.isDeleted&&!p.adminDeleted);
  const ph=posts.length?(await Promise.all(posts.map(p=>buildPost(p)))).join(''):'<div class="empty"><div class="icon">📝</div><p>게시물이 없습니다</p></div>';

  pc.innerHTML=`
    <div class="prfhdr">
      <div class="prfrow">
        <div class="prfpic">${pfp}</div>
        <div class="prfstats">
          <div class="prfstat" onclick="showFL('${uid}','followers')"><div class="prfstat-n">${fol.length}</div><div class="prfstat-l">팔로워</div></div>
          <div class="prfstat" onclick="showFL('${uid}','following')"><div class="prfstat-n">${fing.length}</div><div class="prfstat-l">팔로잉</div></div>
        </div>
      </div>
      <div class="prfuid">${esc(uid)}${badge}</div>
      <div class="prfnick">${esc(u.nickname||'')}</div>
      ${u.bio?`<div class="prfbio">${esc(u.bio)}</div>`:''}
      ${susBadge}
    </div>
    ${acts}
    <div class="prfposts">${ph}</div>`;
}
async function doFollow(uid){
  const target=await getU(uid); if(!target) return;
  CU.following=CU.following||[]; target.followers=target.followers||[];
  const wasF=CU.following.includes(uid);
  if(wasF){ CU.following=CU.following.filter(x=>x!==uid); target.followers=target.followers.filter(x=>x!==CU.id); }
  else{ CU.following.push(uid); target.followers.push(CU.id); await pushN(uid,'👥',`<strong>${CU.id}</strong>님이 회원님을 팔로우했습니다.`); }
  await setU(CU); await setU(target);
  await renderProfile(uid); toast(!wasF?`${uid}을(를) 팔로우했습니다.`:'팔로우 취소');
}
async function showFL(uid,type){
  const u=await getU(uid); if(!u) return;
  const list=type==='followers'?(u.followers||[]):(u.following||[]);
  document.getElementById('flist-title').textContent=type==='followers'?'팔로워':'팔로잉';
  const cont=document.getElementById('flist-cont');
  if(!list.length){cont.innerHTML='<div class="empty"><p>목록이 비어있습니다</p></div>';OM('m-flist');return;}
  const items=await Promise.all(list.map(async id=>{
    const lu=await getU(id);
    const pi=lu&&lu.pfp?`<img src="${lu.pfp}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`:`<div style="width:40px;height:40px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);">${uid2init(id)}</div>`;
    return `<div class="fitem" onclick="CM('m-flist');goProfile('${id}')"><div class="fiav">${pi}</div><div><div style="font-weight:700;font-size:13px;">${esc(id)}</div><div style="font-size:11px;color:var(--ts);">${esc(lu?lu.nickname:'')}</div></div></div>`;
  }));
  cont.innerHTML=items.join(''); OM('m-flist');
}

// ===== PROFILE EDIT =====
function openPE(){
  document.getElementById('pe-id-new').value='';
  document.getElementById('pe-pw-new').value='';
  document.getElementById('pe-nick').value=CU.nickname||'';
  document.getElementById('pe-bio').value=CU.bio||'';
  document.getElementById('pe-pfp-prev').innerHTML=CU.pfp?`<img src="${CU.pfp}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;">`:'';
  document.getElementById('pe-err').textContent='';
  OM('m-pedit');
}
function prevPfp(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ newPfpURL=e.target.result; document.getElementById('pe-pfp-prev').innerHTML=`<img src="${newPfpURL}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;">`; };
  r.readAsDataURL(f);
}
async function savePE(){
  const errEl=document.getElementById('pe-err'); errEl.textContent='';
  const newId=document.getElementById('pe-id-new').value.trim();
  const newPw=document.getElementById('pe-pw-new').value;
  const newNick=document.getElementById('pe-nick').value.trim();
  const newBio=document.getElementById('pe-bio').value.trim();

  // 아이디 변경 요청
  if(newId && newId!==CU.id){
    if(!/^[a-zA-Z0-9_]{2,20}$/.test(newId)){errEl.textContent='아이디: 영문·숫자·_ 2~20자만 가능합니다.';return;}
    if(newId==='admin'){errEl.textContent='사용할 수 없는 아이디입니다.';return;}
    const ex=await getU(newId);
    if(ex){errEl.textContent='이미 사용 중인 아이디입니다.';return;}
    // 기존 유저 문서 삭제 후 새 id로 재생성
    const oldId=CU.id;
    CU.id=newId;
    if(newPw) CU.password=newPw;
    CU.nickname=newNick; CU.bio=newBio;
    if(newPfpURL){ const url=await uploadImage(newPfpURL,'pfp/'+newId+'.jpg'); CU.pfp=url; newPfpURL=null; }
    await setU(CU);
    // 팔로워/팔로잉 관계에서 oldId→newId 업데이트는 복잡하므로 localStorage도 갱신
    try{ await deleteDoc(doc(db,'users',oldId)); }catch(e){}
    ls.saveUsers(ls.getUsers().filter(u=>u.id!==oldId));
    localStorage.setItem('mm_cur',newId);
    CM('m-pedit'); toast('아이디가 변경되었습니다. 다시 로그인해주세요.');
    doLogout(); return;
  }

  if(newPw) CU.password=newPw;
  CU.nickname=newNick; CU.bio=newBio;
  if(newPfpURL){
    toast('프로필 사진 업로드 중...');
    const url=await uploadImage(newPfpURL,'pfp/'+CU.id+'.jpg');
    CU.pfp=url; newPfpURL=null;
  }
  await setU(CU); CM('m-pedit'); await renderProfile(CU.id); toast('프로필이 저장되었습니다!');
}

// ===== ADMIN =====
async function openAdmin(){
  const users=await getAllUsers();
  const rows=users.map(u=>`
    <div class="uarow">
      <div class="uainfo">
        <div class="uaid">${esc(u.id)}</div>
        <div class="uapw">PW: ${esc(u.password)}</div>
        ${u.suspended?`<div style="font-size:10px;color:var(--d);">${u.suspended.type==='perm'?'영구정지':`${Math.ceil((u.suspended.until-Date.now())/86400000)}일 정지`}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:11px;color:var(--ts);">부관리자</span>
        <label class="tsw"><input type="checkbox" ${u.isSubAdmin?'checked':''} onchange="setSubAdmin('${u.id}',this.checked)"><span class="tsl"></span></label>
      </div>
    </div>`).join('');
  document.getElementById('prcontent').innerHTML=`
    <div class="phdr" style="background:var(--d);"><button class="bkbtn" onclick="goProfile('admin')">‹</button><span class="phdr-t">관리자 설정</span></div>
    <div class="asec"><div class="acard"><div class="actitle">⚙️ 이용자 목록 (${users.length}명)</div>${rows||'<div style="font-size:12px;color:var(--ts);">가입자 없음</div>'}</div></div>`;
}
async function setSubAdmin(uid,val){ const u=await getU(uid); if(!u) return; u.isSubAdmin=val; await setU(u); toast(val?`${uid} 부관리자 지정`:`${uid} 부관리자 해제`); }
async function openSusMod(uid){ susTgt=uid; const u=await getU(uid); document.getElementById('sus-info').textContent=`대상: ${uid} (${u?u.nickname:''})`; OM('m-sus'); }
async function doSuspend(type){
  if(!susTgt) return; const u=await getU(susTgt); if(!u) return;
  if(type==='perm'){u.suspended={type:'perm'};toast(`${susTgt} 영구정지`);}
  else if(type==='days'){const d=parseInt(document.getElementById('sus-days').value);if(!d||d<1){toast('일수를 입력하세요');return;}u.suspended={type:'days',until:Date.now()+d*86400000};toast(`${susTgt} ${d}일 정지`);}
  else{u.suspended=null;toast(`${susTgt} 정지 해제`);}
  await setU(u); CM('m-sus'); await renderProfile(susTgt);
}

async function removeBadge(){

}

async function clearNotifs(){
