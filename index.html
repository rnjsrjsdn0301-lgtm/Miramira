<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRAMIRA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--p:#7B5EA7;--pd:#5C3D8F;--pl:#A688D4;--pbg:#F3EEF9;--ps:#EDE5F7;--d:#EF4444;--s:#22C55E;--t:#1e1e2e;--ts:#6b6b8a;--b:#DDD6F3;--bg:#F8F5FC;--sh:0 1px 8px rgba(123,94,167,.09);--shl:0 4px 20px rgba(123,94,167,.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:13px;}
input,textarea,button{font-family:'Noto Sans KR',sans-serif;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#auth-screen{background:linear-gradient(160deg,var(--pbg) 0%,#fff 60%,var(--ps) 100%);align-items:center;justify-content:center;padding:16px;}
.auth-box{width:100%;max-width:380px;}
.logo-wrap{text-align:center;margin-bottom:18px;}
.auth-tabs{display:flex;background:var(--ps);border-radius:10px;padding:3px;margin-bottom:12px;}
.auth-tab{flex:1;padding:7px;text-align:center;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;color:var(--p);transition:.2s;}
.auth-tab.active{background:var(--p);color:#fff;}
.auth-form{display:none;flex-direction:column;gap:8px;}
.auth-form.active{display:flex;}
.ig{display:flex;flex-direction:column;gap:3px;}
.ig label{font-size:11px;font-weight:700;color:var(--pd);letter-spacing:.3px;}
.ig input{padding:8px 10px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;transition:.2s;background:#fff;}
.ig input:focus{outline:none;border-color:var(--p);}
.btn-p{background:var(--p);color:#fff;border:none;padding:9px;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer;transition:.2s;}
.btn-p:hover{background:var(--pd);}
.btn-o{background:none;border:1.5px solid var(--p);color:var(--p);padding:5px 10px;border-radius:7px;font-weight:700;font-size:11px;cursor:pointer;}
.btn-do{background:none;border:1.5px solid var(--d);color:var(--d);padding:5px 10px;border-radius:7px;font-weight:700;font-size:11px;cursor:pointer;}
.btn-f{background:var(--p);color:#fff;border:none;padding:5px 12px;border-radius:7px;font-weight:700;font-size:11px;cursor:pointer;}
.btn-f.ing{background:#fff;color:var(--p);border:1.5px solid var(--p);}
.btn-sec{background:var(--bg);color:var(--ts);border:none;padding:8px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;}
.aerr{color:var(--d);font-size:11px;text-align:center;min-height:13px;}
#main-screen{padding-bottom:56px;overflow-y:auto;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:6px 10px;}
.topbar-right{display:flex;align-items:center;gap:2px;}
.nb{position:relative;background:none;border:none;cursor:pointer;padding:4px;color:var(--ts);display:flex;align-items:center;}
.nb svg{width:18px;height:18px;}
.nbadge{position:absolute;top:1px;right:1px;width:6px;height:6px;background:var(--d);border-radius:50%;border:1.5px solid #fff;display:none;}
.nbadge.on{display:block;}
.npanel{display:none;position:fixed;top:42px;right:6px;width:280px;max-width:calc(100vw - 12px);background:#fff;border:1px solid var(--b);border-radius:11px;box-shadow:var(--shl);z-index:300;max-height:340px;overflow-y:auto;}
.npanel.open{display:block;}
.nphead{padding:8px 11px 5px;font-weight:800;font-size:11px;color:var(--pd);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b);}
.npclear{background:none;border:none;font-size:10px;color:var(--ts);cursor:pointer;font-weight:700;}
.nitem{display:flex;gap:7px;padding:7px 11px;border-bottom:1px solid var(--b);cursor:pointer;}
.nitem:last-child{border-bottom:none;}
.nitem.unread{background:var(--ps);}
.nitem-icon{font-size:14px;flex-shrink:0;}
.nitem-body{flex:1;}
.nitem-text{font-size:11px;line-height:1.3;color:var(--t);}
.nitem-text strong{color:var(--pd);}
.nitem-time{font-size:9px;color:var(--ts);margin-top:1px;}
.sw{padding:7px 0 4px;overflow-x:auto;display:flex;gap:7px;padding-left:9px;scrollbar-width:none;}
.sw::-webkit-scrollbar{display:none;}
.si{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;}
.sr{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),#C084FC);padding:2px;}
.sav{width:100%;height:100%;border-radius:50%;border:2px solid #fff;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--p);overflow:hidden;}
.sav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sname{font-size:9px;color:var(--ts);max-width:48px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sadd{width:44px;height:44px;border-radius:50%;background:var(--ps);border:2px dashed var(--pl);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--p);}
.feed{padding:4px 7px;display:flex;flex-direction:column;gap:5px;}
.pc{background:#fff;border-radius:9px;padding:9px 10px;box-shadow:var(--sh);border:1px solid var(--b);}
.pc.adel{border-color:#fca5a5;background:#fff5f5;}
.ph{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.pav{width:30px;height:30px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--p);cursor:pointer;flex-shrink:0;overflow:hidden;}
.pav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pmeta{flex:1;}
.puid{font-weight:700;font-size:12px;color:var(--pd);cursor:pointer;}
.puid:hover{text-decoration:underline;}
.pdate{font-size:9px;color:var(--ts);}
.pmore{position:relative;}
.mbtn{background:none;border:none;cursor:pointer;color:var(--ts);font-size:14px;padding:2px;border-radius:4px;}
.mbtn:hover{background:var(--ps);}
.dd{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--b);border-radius:8px;box-shadow:var(--shl);z-index:50;min-width:105px;overflow:hidden;}
.dd.open{display:block;}
.ddi{padding:6px 11px;font-size:11px;cursor:pointer;white-space:nowrap;}
.ddi:hover{background:var(--ps);color:var(--p);}
.ddi.danger{color:var(--d);}
.pcont{font-size:12px;line-height:1.5;color:var(--t);margin-bottom:6px;white-space:pre-wrap;}
.pcont.adel{color:var(--d);font-weight:700;font-size:11px;}
.rtinfo{font-size:10px;color:var(--pl);margin-bottom:4px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;padding:3px 6px;background:var(--ps);border-radius:5px;}
.pacts{display:flex;border-top:1px solid var(--b);margin-top:4px;padding-top:3px;}
.abt{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;padding:3px 2px;border:none;background:none;cursor:pointer;font-size:10px;color:var(--ts);border-radius:4px;font-weight:600;}
.abt:hover{background:var(--ps);color:var(--p);}
.abt.lk{color:#E91E8C;}
.abt.dk{color:var(--d);}
.abt.rk{color:var(--p);}
.cmsec{margin-top:6px;border-top:1px solid var(--b);padding-top:5px;display:flex;flex-direction:column;gap:4px;}
.cc{background:var(--pbg);border-radius:6px;padding:5px 8px;}
.ch{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.cav{width:20px;height:20px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--p);cursor:pointer;flex-shrink:0;overflow:hidden;}
.cav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cuid{font-weight:700;font-size:10px;color:var(--pd);cursor:pointer;}
.cuid:hover{text-decoration:underline;}
.cdate{font-size:9px;color:var(--ts);margin-left:auto;}
.ccont{font-size:11px;line-height:1.4;white-space:pre-wrap;}
.cacts{display:flex;gap:3px;margin-top:2px;}
.cabt{background:none;border:none;font-size:9px;color:var(--ts);cursor:pointer;display:flex;align-items:center;gap:1px;padding:1px 4px;border-radius:3px;font-weight:600;}
.cabt:hover{background:rgba(123,94,167,.1);color:var(--p);}
.cabt.lk{color:#E91E8C;}
.cabt.dk{color:var(--d);}
.cir{display:flex;gap:4px;align-items:flex-end;margin-top:4px;}
.cinput{flex:1;padding:5px 7px;border:1.5px solid var(--b);border-radius:6px;font-size:11px;resize:none;min-height:26px;max-height:56px;}
.cinput:focus{outline:none;border-color:var(--p);}
.csub{background:var(--p);color:#fff;border:none;padding:4px 9px;border-radius:6px;font-weight:700;font-size:10px;cursor:pointer;}
.tcbtn{background:none;border:none;color:var(--p);font-size:10px;font-weight:700;cursor:pointer;padding:1px 0;margin-top:0;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--b);display:flex;z-index:100;padding:2px 0 3px;}
.nnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px;border:none;background:none;cursor:pointer;color:var(--ts);font-size:8px;font-weight:700;}
.nnbtn.active{color:var(--p);}
.nnbtn svg{width:18px;height:18px;}
.nnbtn.upbtn{background:var(--p);border-radius:10px;color:#fff;margin:2px 4px;}
#search-screen{overflow-y:auto;}
.shdr{padding:7px 9px;background:#fff;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:10;}
.siwrap{position:relative;}
.siwrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ts);width:13px;height:13px;}
.sinput{width:100%;padding:7px 9px 7px 28px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;background:var(--bg);}
.sinput:focus{outline:none;border-color:var(--p);background:#fff;}
.sres{padding:6px;}
.stitle{font-size:10px;font-weight:800;color:var(--p);letter-spacing:.3px;margin:5px 0 3px;}
.uri{display:flex;align-items:center;gap:7px;padding:7px;background:#fff;border-radius:8px;border:1px solid var(--b);cursor:pointer;margin-bottom:4px;}
.uri:hover{border-color:var(--pl);}
#profile-screen{overflow-y:auto;}
.prfhdr{background:var(--p);padding:12px 11px 9px;color:#fff;}
.prfrow{display:flex;align-items:flex-end;gap:10px;margin-bottom:6px;}
.prfpic{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;overflow:hidden;}
.prfpic img{width:100%;height:100%;object-fit:cover;}
.prfstats{display:flex;gap:12px;flex:1;justify-content:flex-end;}
.prfstat{text-align:center;cursor:pointer;}
.prfstat-n{font-size:15px;font-weight:800;}
.prfstat-l{font-size:9px;opacity:.8;}
.prfuid{font-size:14px;font-weight:800;}
.prfnick{font-size:11px;opacity:.8;margin-top:1px;}
.prfbio{font-size:11px;opacity:.75;margin-top:3px;line-height:1.35;}
.prfacts{display:flex;gap:5px;padding:6px 9px;background:#fff;border-bottom:1px solid var(--b);flex-wrap:wrap;align-items:center;}
.prfposts{padding:6px;}
.susbadge{background:#fef2f2;border:1px solid #fca5a5;color:var(--d);padding:2px 5px;border-radius:5px;font-size:10px;font-weight:700;display:inline-block;margin-top:3px;}
.ubadge{display:inline;font-size:11px;margin-left:2px;vertical-align:middle;}
.stv{display:none;position:fixed;inset:0;background:#000;z-index:400;flex-direction:column;}
.stv.open{display:flex;}
.stpbars{display:flex;gap:3px;padding:7px 8px 4px;}
.stpbar{flex:1;height:2px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.stpfill{height:100%;background:#fff;width:0%;transition:width 5s linear;}
.stvhdr{display:flex;align-items:center;gap:7px;padding:5px 8px;}
.stvav{width:26px;height:26px;border-radius:50%;border:1.5px solid #fff;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);font-size:10px;overflow:hidden;}
.stvav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.stvname{color:#fff;font-weight:700;font-size:11px;flex:1;}
.stvtime{color:rgba(255,255,255,.7);font-size:10px;}
.stvcls{color:#fff;background:none;border:none;font-size:19px;cursor:pointer;padding:2px 5px;}
.stimgwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;position:relative;user-select:none;}
.stimgwrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;pointer-events:none;}
.sttap{position:absolute;top:0;bottom:0;width:40%;z-index:10;cursor:pointer;}
.sttap.left{left:0;}
.sttap.right{right:0;}
.moverlay{display:none;position:fixed;inset:0;background:rgba(30,20,50,.5);backdrop-filter:blur(3px);z-index:200;align-items:flex-end;justify-content:center;}
.moverlay.center{align-items:center;padding:9px;}
.moverlay.open{display:flex;}
.mbox{background:#fff;border-radius:12px 12px 0 0;padding:13px 13px;width:100%;max-width:450px;max-height:85vh;overflow-y:auto;}
.moverlay.center .mbox{border-radius:12px;}
.mtitle{font-size:13px;font-weight:800;color:var(--pd);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.mcls{background:none;border:none;cursor:pointer;color:var(--ts);font-size:18px;line-height:1;padding:2px 5px;}
.macts{display:flex;gap:6px;margin-top:10px;}
.macts .btn-p{flex:1;}
.uptbtns{display:flex;gap:7px;}
.uptbtn{flex:1;padding:12px;border:1.5px solid var(--b);border-radius:9px;background:#fff;cursor:pointer;text-align:center;transition:.15s;}
.uptbtn:hover{border-color:var(--p);background:var(--ps);}
.uptbtn .icon{font-size:22px;margin-bottom:4px;}
.uptbtn .lbl{font-weight:700;font-size:11px;color:var(--pd);}
.mta{width:100%;padding:7px 9px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;resize:none;min-height:70px;}
.mta:focus{outline:none;border-color:var(--p);}
.ccount{text-align:right;font-size:10px;color:var(--ts);margin-top:2px;}
.ccount.warn{color:var(--d);}
.asec{padding:6px 8px;}
.acard{background:#fff;border-radius:9px;border:1.5px solid #fca5a5;padding:9px;margin-bottom:7px;}
.actitle{font-size:11px;font-weight:800;color:var(--d);margin-bottom:7px;}
.uarow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b);}
.uarow:last-child{border-bottom:none;}
.uainfo{font-size:11px;}
.uaid{font-weight:700;}
.uapw{color:var(--ts);font-size:10px;}
.tsw{position:relative;width:32px;height:17px;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:17px;cursor:pointer;transition:.2s;}
.tsl:before{content:'';position:absolute;height:11px;width:11px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.tsw input:checked+.tsl{background:var(--p);}
.tsw input:checked+.tsl:before{transform:translateX(15px);}
.pirow{display:flex;flex-direction:column;gap:5px;}
.piitem{background:var(--pbg);border-radius:7px;padding:6px 9px;}
.pilabel{font-size:9px;font-weight:800;color:var(--p);letter-spacing:.3px;margin-bottom:2px;}
.pival{font-size:11px;font-weight:600;color:var(--t);}
.empty{text-align:center;padding:20px 12px;color:var(--ts);}
.empty .icon{font-size:26px;margin-bottom:4px;}
.empty p{font-size:11px;}
.phdr{display:flex;align-items:center;gap:7px;padding:9px 11px;background:var(--p);color:#fff;}
.phdr-t{font-weight:800;font-size:12px;}
.bkbtn{background:none;border:none;color:#fff;font-size:17px;cursor:pointer;}
.flist{padding:6px;}
.fitem{display:flex;align-items:center;gap:7px;padding:7px;background:#fff;border-radius:8px;border:1px solid var(--b);cursor:pointer;margin-bottom:3px;}
.fitem:hover{border-color:var(--pl);}
.fiav{width:32px;height:32px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--p);overflow:hidden;}
.fiav img{width:100%;height:100%;object-fit:cover;}
.toast{position:fixed;bottom:62px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--pd);color:#fff;padding:6px 13px;border-radius:8px;font-size:11px;font-weight:700;z-index:600;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.einput{width:100%;padding:6px 7px;border:1.5px solid var(--pl);border-radius:6px;font-size:11px;margin-top:2px;}
.einput:focus{outline:none;border-color:var(--p);}
.susp-opts{display:flex;flex-direction:column;gap:5px;}
.susp-opt{padding:8px;border:1.5px solid var(--b);border-radius:7px;cursor:pointer;font-weight:600;font-size:11px;text-align:center;transition:.15s;}
.susp-opt:hover{border-color:var(--d);color:var(--d);background:#fff5f5;}
.susp-di{display:flex;gap:5px;align-items:center;}
.susp-di input{flex:1;padding:7px;border:1.5px solid var(--b);border-radius:7px;font-size:11px;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.feed-tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--b);position:sticky;top:42px;z-index:90;}
.ftab{flex:1;padding:7px;border:none;background:none;font-weight:700;font-size:11px;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:.15s;}
.ftab.active{color:var(--p);border-bottom-color:var(--p);}
.qrt-block{background:var(--pbg);border:1px solid var(--b);border-radius:7px;padding:6px 8px;margin-top:4px;cursor:pointer;}
.qrt-block:hover{background:var(--ps);}
.qrt-author{font-size:10px;font-weight:700;color:var(--pd);margin-bottom:2px;}
.qrt-content{font-size:10px;color:var(--ts);white-space:pre-wrap;line-height:1.35;}
.mention{color:var(--p);font-weight:700;cursor:pointer;text-decoration:none;}
.mention:hover{text-decoration:underline;}
.hashtag{color:#0284c7;font-weight:700;cursor:pointer;text-decoration:none;}
.hashtag:hover{text-decoration:underline;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="logo-wrap">
      <svg width="220" height="56" viewBox="0 0 370 80"><text x="8" y="60" font-family="'Nunito',sans-serif" font-weight="900" font-size="60" fill="#7B5EA7" letter-spacing="-2">MIRAMIRA</text><rect x="285" y="10" width="64" height="46" rx="7" fill="#7B5EA7"/><text x="317" y="31" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">I LOVE</text><text x="317" y="46" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">YOU</text><polygon points="305,56 317,70 329,56" fill="#7B5EA7"/></svg>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
      <div class="auth-tab" id="tab-reg" onclick="switchTab('reg')">회원가입</div>
    </div>
    <div class="auth-form active" id="form-login">
      <div class="ig"><label>아이디</label><input id="li-id" type="text" placeholder="아이디 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="ig"><label>비밀번호</label><input id="li-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="aerr" id="li-err"></div>
      <button class="btn-p" onclick="doLogin()">로그인</button>
    </div>
    <div class="auth-form" id="form-reg">

// 이미지를 최대치수/품질로 압축해 base64 반환 (Firestore 1MB 이내 목표)
function compressImage(dataURL, maxDim=900, quality=0.72){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let {width,height}=img;
      if(width>maxDim||height>maxDim){
        if(width>height){ height=Math.round(height*maxDim/width); width=maxDim; }
        else { width=Math.round(width*maxDim/height); height=maxDim; }
      }
      const cv=document.createElement('canvas');
      cv.width=width; cv.height=height;
      cv.getContext('2d').drawImage(img,0,0,width,height);
      try{ resolve(cv.toDataURL('image/jpeg',quality)); }
      catch(e){ resolve(dataURL); }
    };
    img.onerror=()=>resolve(dataURL);
    img.src=dataURL;
  });
}
// 이미지 업로드: Storage 우선(3초 타임아웃), 실패 시 압축 base64 (문자열 URL 직접 반환)
async function uploadImage(dataURL, storagePath) {
  // 1) Firebase Storage 시도 (3초 안에 안 되면 포기)
  try {
    const uploadPromise = (async()=>{
      const r = sRef(storage, storagePath);
      const snap = await uploadString(r, dataURL, 'data_url');
      return await getDownloadURL(snap.ref);
    })();
    const url = await Promise.race([
      uploadPromise,
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), 3000))
    ]);
    if(url) return url;
  } catch(e) {}
  // 2) 실패 → 압축한 base64를 그대로 반환
  try {
    let compressed = await compressImage(dataURL);
    if(compressed.length > 950000) compressed = await compressImage(dataURL, 640, 0.6);
    if(compressed.length > 950000) compressed = await compressImage(dataURL, 480, 0.5);
    return compressed;
  } catch(e) { return dataURL; }
}

function tsToMs(ts) {
  if(!ts) return 0;
  if(typeof ts === 'number') return ts;
  if(ts.seconds) return ts.seconds * 1000;
  return 0;
}
function uid2init(id){ return String(id||'?').substring(0,2).toUpperCase(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 텍스트에서 @멘션, #해시태그를 클릭 가능한 링크로 변환
function renderText(text){
  if(!text) return '';
  // 1. escape HTML 먼저
  let s = esc(text);
  // 2. @멘션: @아이디 (영문·숫자·_ 1~20자)
  s = s.replace(/@([a-zA-Z0-9_]{1,20})/g, (match, uid) => {
    return `<span class="mention" onclick="goProfile('${uid}')">@${uid}</span>`;
  });
  // 3. #해시태그: #단어 (한글·영문·숫자·_ 1~30자)
  s = s.replace(/#([\w가-힣]{1,30})/g, (match, tag) => {
    return `<span class="hashtag" onclick="searchHashtag('${esc(tag)}')">#${tag}</span>`;
  });
  return s;
}
function fmtDate(ts){
  const t = tsToMs(ts);
  if(!t) return '';
  const d = Date.now()-t;
  if(d<60000) return '방금 전';
  if(d<3600000) return Math.floor(d/60000)+'분 전';
  if(d<86400000) return Math.floor(d/3600000)+'시간 전';
  const dd=new Date(t); return `${dd.getFullYear()}.${dd.getMonth()+1}.${dd.getDate()}`;
}
function fmtDateFull(ts){
  const t = tsToMs(ts);
  if(!t) return '알 수 없음';
  const d=new Date(t);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function gid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function getBrowser(){
  const ua=navigator.userAgent;
  if(ua.includes('Edg')) return 'Edge';
  if(ua.includes('Chrome')) return 'Chrome';
  if(ua.includes('Firefox')) return 'Firefox';
  if(ua.includes('Safari')) return 'Safari';
  return '기타';
}
function isSus(u){
  if(!u||!u.suspended) return false;
  if(u.suspended.type==='perm') return true;
  if(u.suspended.type==='days') return Date.now()<u.suspended.until;
  return false;
}

async function renderFeed(){
  isRendering=true;
  try {
    await renderStories();
    let posts=(await getAllPosts()).filter(p=>!p.isDeleted);

    if(feedTab==='follow'){
      // 팔로우 탭: 내가 팔로우한 사람 + 나 자신
      const followed=new Set([...(CU.following||[]), CU.id]);
      posts=posts.filter(p=>followed.has(p.authorId));
      posts.sort((a,b)=>tsToMs(b.createdAt)-tsToMs(a.createdAt));
    } else {
      // 전체 탭: 최신순
      posts.sort((a,b)=>tsToMs(b.createdAt)-tsToMs(a.createdAt));
    }

    const feed=document.getElementById('feed');
    if(!posts.length){
      feed.innerHTML=feedTab==='follow'
        ?'<div class="empty"><div class="icon">👥</div><p>팔로우한 사람의 게시물이 없어요</p></div>'
        :'<div class="empty"><div class="icon">✨</div><p>아직 게시물이 없어요</p></div>';
      return;
    }
    const htmls=await Promise.all(posts.map(p=>buildPost(p)));
    // 광고 삽입 (전체 탭에만): 게시물 10개당 약 1개, 같은 광고 연속 방지
    if(feedTab==='all'){
      const ads=await getAllAds();
      if(ads.length){
        const insertCount=Math.floor(htmls.length/10); // 10개당 1개
        let lastAdId=null;
        for(let i=0;i<insertCount;i++){
          // 직전 광고와 다른 광고 선택
          let ad=ads[Math.floor(Math.random()*ads.length)];
          if(ads.length>1){
            let tries=0;
            while(ad.id===lastAdId && tries<5){ ad=ads[Math.floor(Math.random()*ads.length)]; tries++; }
          }
          lastAdId=ad.id;
          // 10개 간격 위치에 삽입 (연속 방지를 위해 분산)
          const pos=Math.min(htmls.length, (i+1)*10 + i);
          htmls.splice(pos,0,buildAd(ad));
        }
      }
    }
    feed.innerHTML=htmls.join('');
  } finally { isRendering=false; }
}

async function buildComment(pid,c){
  const isOwn=CU.id===c.authorId; const isAd=CU.isAdmin||CU.isSubAdmin; const sus=isSus(CU);
  const lk=c.likes||[]; const dk=c.dislikes||[]; const rt=c.retweets||[];
  let acts='';
  if(!sus){
    acts=`<button class="cabt${lk.includes(CU.id)?' lk':''}" onclick="cmLike('${pid}','${c.id}')">👍 ${lk.length}</button>
    <button class="cabt${dk.includes(CU.id)?' dk':''}" onclick="cmDislike('${pid}','${c.id}')">👎 ${dk.length}</button>
    <button class="cabt${rt.includes(CU.id)?' rk':''}" onclick="cmRetweet('${pid}','${c.id}')">🔁 ${rt.length}</button>`;
  }
  if(isOwn) acts+=`<button class="cabt" onclick="editCm('${pid}','${c.id}')">수정</button><button class="cabt" style="color:var(--d);" onclick="delCm('${pid}','${c.id}',false)">삭제</button>`;
  else if(isAd) acts+=`<button class="cabt" style="color:var(--d);" onclick="delCm('${pid}','${c.id}',true)">관리자삭제</button>`;
  // 관리자는 댓글 정보도 볼 수 있음
  if(isAd) acts+=`<button class="cabt" onclick="showCInfo('${pid}','${c.id}')">📋</button>`;
  // 댓글 작성자 배지
  const cAuthorU = await getU(c.authorId).catch(()=>null);
  const cBadge = getBadgeHtml(cAuthorU);
  const cAvatarImg = cAuthorU && cAuthorU.pfp ? resolveImg(cAuthorU.pfp) : '';
  const cav = cAvatarImg ? `<img src="${cAvatarImg}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;">` : `<span>${uid2init(c.authorId)}</span>`;
  return `<div class="cc" id="cc-${c.id}">
    <div class="ch">
      <div class="cav" onclick="goProfile('${c.authorId}')">${cav}</div>
      <div class="cuid" onclick="goProfile('${c.authorId}')">${esc(c.authorId)}${cBadge}</div>
      <div class="cdate">${fmtDate(c.createdAt)}</div>
    </div>
    <div class="ccont" style="white-space:pre-wrap;">${renderText(c.content)}</div>
    <div class="cacts">${acts}</div>
  </div>`;
}

async function submitQRT(){
  const pid=document.getElementById('qrt-pid').textContent;
  const txt=document.getElementById('qrt-ta').value.trim();
  const p=await getP(pid); if(!p) return;
  // 인용 리트윗: 내 글 + quoteOf 필드
  const mentions=[...new Set((txt.match(/@([a-zA-Z0-9_]{1,20})/g)||[]).map(m=>m.slice(1)))];
  const hashtags=[...new Set((txt.match(/#([\w가-힣]{1,30})/g)||[]).map(h=>h.slice(1)))];
  const rp={id:gid(),authorId:CU.id,content:txt||'',createdAt:Date.now(),likes:[],dislikes:[],retweets:[],comments:[],quoteOf:pid,browser:getBrowser(),mentions,hashtags};
  // 원본 retweets 배열에도 추가 (카운트용)
  p.retweets=p.retweets||[];
  if(!p.retweets.includes(CU.id)) p.retweets.push(CU.id);
  p.quotedBy=p.quotedBy||[]; if(!p.quotedBy.includes(CU.id)) p.quotedBy.push(CU.id);
  await setP(p); await setP(rp);
  if(p.authorId!==CU.id) await pushN(p.authorId,'🔁',`<strong>${CU.id}</strong>님이 회원님의 게시물을 인용 리트윗했습니다.`);
  for(const uid of mentions){ if(uid!==CU.id){ const mu=await getU(uid); if(mu) await pushN(uid,'📣',`<strong>${CU.id}</strong>님이 게시물에서 회원님을 언급했습니다.`); } }
  CM('m-qrt'); await renderFeed(); toast('인용 리트윗했습니다!');
}
async function doRetweet(pid){
  const allP=await getAllPosts(); const pIdx=allP.findIndex(p=>p.id===pid); if(pIdx<0) return;
  const p=allP[pIdx]; p.retweets=p.retweets||[];
  if(p.retweets.includes(CU.id)){
    p.retweets=p.retweets.filter(x=>x!==CU.id); await setP(p);
    const myRt=allP.find(r=>(r.retweetOf===pid||r.quoteOf===pid)&&r.authorId===CU.id);
    if(myRt) await delP(myRt.id);
    await renderFeed(); toast('리트윗을 취소했습니다.'); return;
  }
  p.retweets.push(CU.id); await setP(p);
  if(p.authorId!==CU.id) await pushN(p.authorId,'🔁',`<strong>${CU.id}</strong>님이 회원님의 게시물을 리트윗했습니다.`);
  for(const fid of (CU.following||[])) if(fid!==CU.id) await pushN(fid,'🔁',`<strong>${CU.id}</strong>님이 새 리트윗을 올렸습니다.`);
  // 일반 리트윗: 본문 없이 원본을 박스로 표시 (retweetOf)
  const rp={id:gid(),authorId:CU.id,content:'',createdAt:Date.now(),likes:[],dislikes:[],retweets:[],comments:[],retweetOf:pid,browser:getBrowser()};
  await setP(rp);
  await renderFeed(); toast('리트윗했습니다!');
}

async function cmRetweet(pid,cid){
  const p=await getP(pid); if(!p) return;
  const c=p.comments.find(c=>c.id===cid); if(!c) return;
  c.retweets=c.retweets||[];
  const had=c.retweets.includes(CU.id);
  if(had){
    c.retweets=c.retweets.filter(x=>x!==CU.id); await setP(p);
    // 댓글 RT 게시물도 삭제
    const allP=await getAllPosts();

    if(myRt) await delP(myRt.id);
    await refreshComments(pid); toast('댓글 리트윗을 취소했습니다.'); return;
  }
  c.retweets.push(CU.id); await setP(p);
  // 댓글 내용을 메인 피드에 독립 게시물로
  const rp={id:gid(),authorId:CU.id,content:c.content,createdAt:Date.now(),likes:[],dislikes:[],retweets:[],comments:[],retweetOfComment:cid,browser:getBrowser()};

async function submitCm(pid){
  if(isSus(CU)){toast('정지된 계정입니다.');return;}
  const inp=document.getElementById('ci-'+pid); if(!inp) return;
  const txt=inp.value.trim(); if(!txt) return;
  const p=await getP(pid); if(!p) return;
  p.comments=p.comments||[];
  if(editCid){
    const c=p.comments.find(c=>c.id===editCid);
    if(c){c.content=txt;c.edited=true;}
    await setP(p); editCid=null; inp.value=''; await refreshComments(pid); toast('댓글이 수정되었습니다.'); return;
  }
  const cm={id:gid(),authorId:CU.id,content:txt,createdAt:Date.now(),likes:[],dislikes:[],retweets:[],browser:getBrowser()};
  p.comments.push(cm); await setP(p);
  if(p.authorId!==CU.id) await pushN(p.authorId,'💬',`<strong>${CU.id}</strong>님이 회원님의 게시물에 댓글을 달았습니다.`);
  // 댓글 멘션 알림
  const mentions=[...new Set((txt.match(/@([a-zA-Z0-9_]{1,20})/g)||[]).map(m=>m.slice(1)))];
  for(const uid of mentions){
    if(uid===CU.id||uid===p.authorId) continue;
    const mu=await getU(uid);
    if(mu) await pushN(uid,'📣',`<strong>${CU.id}</strong>님이 댓글에서 회원님을 언급했습니다.`);
  }
  inp.value=''; await refreshComments(pid);
}

async function submitPost(){
  const txt=document.getElementById('post-ta').value.trim();
  if(!txt){toast('내용을 입력하세요.');return;}
  if(txt.length>100){toast('100자 초과');return;}
  if(editPid){
    const p=await getP(editPid); if(p){p.content=txt;p.edited=true;await setP(p);}
    CM('m-post'); editPid=null; await renderFeed(); toast('수정되었습니다.'); return;
  }
  // IP 수집 (전체)
  // 멘션/해시태그 추출
  const mentions=[...new Set((txt.match(/@([a-zA-Z0-9_]{1,20})/g)||[]).map(m=>m.slice(1)))];
  const hashtags=[...new Set((txt.match(/#([\w가-힣]{1,30})/g)||[]).map(h=>h.slice(1)))];
  const p={id:gid(),authorId:CU.id,content:txt,createdAt:Date.now(),likes:[],dislikes:[],retweets:[],comments:[],browser:getBrowser(),mentions,hashtags};
  await setP(p); CM('m-post');
  // 팔로워에게 알림
  for(const fid of (CU.following||[])) await pushN(fid,'📝',`<strong>${CU.id}</strong>님이 새 게시물을 올렸습니다.`);
  // admin 글이면 전체 알림
  if(CU.id==='admin'){ const us=await getAllUsers(); for(const u of us) await pushN(u.id,'📢','<strong>관리자</strong>가 새 공지를 올렸습니다.'); }
  // 멘션 알림 전송
  for(const uid of mentions){
    if(uid===CU.id) continue;
    const mu=await getU(uid);
    if(mu) await pushN(uid,'📣',`<strong>${CU.id}</strong>님이 게시물에서 회원님을 언급했습니다.`);
  }
  await renderFeed(); toast('게시물이 올라갔어요!');
}
async function submitStory(){
  if(!storyDataURL){toast('사진을 선택하세요.');return;}
  toast('업로드 중...');
  const sid=gid();
  const url = await uploadImage(storyDataURL, 'stories/'+sid+'.jpg');
  const s={id:sid,authorId:CU.id,image:url,createdAt:Date.now()};
  await setS(s); CM('m-story'); storyDataURL=null; await renderStories(); toast('스토리가 올라갔어요!');
}

// ===== STORY VIEWER =====
async function viewStory(uid){
  await cleanStories();
  const all=await getAllStories(); svStories=all.filter(s=>s.authorId===uid);
  if(!svStories.length){toast('스토리가 없습니다.');return;}
  svIdx=0; await showSTV(0); document.getElementById('stv').classList.add('open');
}
async function showSTV(idx){
  const s=svStories[idx];
  const u=await getU(s.authorId);
  const av=document.getElementById('stv-av');
  if(u&&u.pfp) av.innerHTML=`<img src="${resolveImg(u.pfp)}" alt="">`;
  else av.textContent=uid2init(s.authorId);
  document.getElementById('stv-nm').textContent=s.authorId;
  document.getElementById('stv-tm').textContent=fmtDate(s.createdAt);
  document.getElementById('stv-img').src=resolveImg(s.image)||'';
  // 삭제 버튼: 본인 or admin/subadmin
  const isOwn=CU.id===s.authorId; const isAd=CU.isAdmin||CU.isSubAdmin;
  const delBtn=document.getElementById('stv-del');
  if(delBtn){ delBtn.style.display=(isOwn||isAd)?'block':'none'; delBtn.onclick=()=>deleteMyStory(s.id); }
  // 진행바
  const bars=document.getElementById('stpbars');
  bars.innerHTML=svStories.map((_,i)=>`<div class="stpbar"><div class="stpfill" id="spf-${i}"></div></div>`).join('');
  for(let i=0;i<idx;i++){ const f=document.getElementById('spf-'+i); if(f)f.style.width='100%'; }
  if(svTimer) clearInterval(svTimer);
  const fill=document.getElementById('spf-'+idx); let pct=0;
  svTimer=setInterval(()=>{
    pct+=1; if(fill)fill.style.width=pct+'%';
    if(pct>=100){ clearInterval(svTimer); svIdx++; if(svIdx<svStories.length)showSTV(svIdx); else closeSTV(); }
  },50);
}
async function deleteMyStory(sid){
  if(!confirm('스토리를 삭제하시겠습니까?')) return;
  await delS(sid);
  svStories=svStories.filter(s=>s.id!==sid);
  if(svStories.length===0){ closeSTV(); await renderStories(); toast('스토리가 삭제되었습니다.'); return; }
  if(svIdx>=svStories.length) svIdx=svStories.length-1;
  await showSTV(svIdx); await renderStories(); toast('스토리가 삭제되었습니다.');
}
function closeSTV(){ if(svTimer)clearInterval(svTimer); document.getElementById('stv').classList.remove('open'); }
function storySkip(d){
  if(svTimer) clearInterval(svTimer);
  if(d===-1){ if(svIdx>0){svIdx--;showSTV(svIdx);}else closeSTV(); }
  else{ if(svIdx<svStories.length-1){svIdx++;showSTV(svIdx);}else closeSTV(); }
}

function searchHashtag(tag){
  navTo('search');
  setTimeout(()=>{
    const inp=document.getElementById('sinput');
    if(inp){ inp.value='#'+tag; doSearch(); }
  },100);
}
async function doSearch(){
  const raw=document.getElementById('sinput').value.trim();
  const q=raw.toLowerCase();
  const res=document.getElementById('sres');
  if(!q){res.innerHTML='<div class="empty"><div class="icon">🔍</div><p>검색어를 입력하세요</p></div>';return;}

  // 해시태그 검색 모드 (#으로 시작)
  const isHashSearch = q.startsWith('#');
  const hashTag = isHashSearch ? q.slice(1) : null;

  const allPosts = await getAllPosts();
  let h='';

  if(isHashSearch){
    // 해시태그로만 검색
    const posts = allPosts.filter(p=>
      !p.adminDeleted && !p.isDeleted &&
      (p.hashtags||[]).some(t=>t.toLowerCase()===hashTag) ||
      (!p.adminDeleted && !p.isDeleted && (p.content||'').toLowerCase().includes(q))
    );
    h+=`<div class="stitle">🏷️ #${esc(raw.slice(1))} 게시물 ${posts.length}개</div>`;
    if(posts.length){
      const ph=await Promise.all(posts.map(p=>buildPost(p)));
      h+=ph.join('');
    } else {
      h+='<div class="empty"><div class="icon">🏷️</div><p>해당 해시태그의 게시물이 없습니다</p></div>';
    }
  } else {
    // 일반 검색: 사용자 + 게시물
    const users=[await getU('admin'),...(await getAllUsers())].filter(Boolean);
    const mu=users.filter(u=>u.id.toLowerCase().includes(q)||(u.nickname||'').toLowerCase().includes(q));
    const posts=allPosts.filter(p=>!p.adminDeleted&&!p.isDeleted&&(p.content||'').toLowerCase().includes(q));
    if(mu.length){
      h+=`<div class="stitle">👤 사용자</div>`;
      h+=mu.map(u=>{
        const img = u.pfp ? resolveImg(u.pfp) : '';
        const pf=img?`<img src="${img}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;">`:`<div style="width:42px;height:42px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);">${uid2init(u.id)}</div>`;
        const bdg=getBadgeHtml(u);
        return `<div class="uri" onclick="goProfile('${u.id}')">${pf}<div><div style="font-weight:700;font-size:13px;">${esc(u.id)}${bdg}</div><div style="font-size:11px;color:var(--ts);">${esc(u.nickname)}</div></div></div>`;
      }).join('');
    }
    if(posts.length){
      h+=`<div class="stitle">📝 게시물</div>`;
      const ph=await Promise.all(posts.map(p=>buildPost(p)));
      h+=ph.join('');
    }
    if(!mu.length&&!posts.length) h='<div class="empty"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>';
  }
  res.innerHTML=h;
}

async function renderProfile(uid){
  const pc=document.getElementById('prcontent');
  pc.innerHTML='<div class="empty" style="padding:40px;"><div class="spin" style="width:28px;height:28px;border-width:3px;"></div></div>';
  const u=await getU(uid);
  if(!u){pc.innerHTML='<div class="empty"><p>사용자를 찾을 수 없습니다</p></div>';return;}
  const isSelf=CU.id===uid; const isAd=CU.isAdmin||CU.isSubAdmin;
  const pfpSrc = u.pfp ? resolveImg(u.pfp) : '';
  const pfp=pfpSrc?`<img src="${pfpSrc}" alt="">`:`<span style="font-size:26px;">${uid2init(uid)}</span>`;
  const fol=u.followers||[]; const fing=u.following||[];
  const isF=(CU.following||[]).includes(uid);
  let susBadge='';
  if(u.suspended){
    if(u.suspended.type==='perm') susBadge='<div class="susbadge">🚫 영구정지</div>';
    else if(u.suspended.type==='days'&&Date.now()<u.suspended.until) susBadge=`<div class="susbadge">⏸ ${Math.ceil((u.suspended.until-Date.now())/86400000)}일 정지 중</div>`;
  }
  const badge=getBadgeHtml(u);

  let acts='';
  if(isSelf){
    acts=`<div class="prfacts">
      <button class="btn-o" onclick="openPE()">프로필 수정</button>
      ${CU.isAdmin?`<button class="btn-p" style="font-size:12px;" onclick="openAdmin()">관리자설정</button>`:''}
      ${CU.isSubAdmin&&!CU.isAdmin?`<button class="btn-p" style="font-size:12px;" onclick="openAdmin()">부관리자설정</button>`:''}
      <button class="btn-o" style="margin-left:auto;" onclick="doLogout()">로그아웃</button>
    </div>`;
  } else {
    // 관리자: 정지 + 인증배지 버튼
    const adBtns=isAd?`
      <button class="btn-do" onclick="openSusMod('${uid}')">정지 설정</button>
      ${CU.isAdmin?`<button class="btn-p" style="font-size:12px;" onclick="openBadgeMod('${uid}')">🏅 인증배지</button>`:''}
    `:'';
    acts=`<div class="prfacts">
      <button class="btn-f ${isF?'ing':''}" onclick="doFollow('${uid}')">${isF?'팔로잉':'팔로우'}</button>
      ${adBtns}
    </div>`;
  }

  const posts=(await getAllPosts()).filter(p=>p.authorId===uid&&!p.isDeleted&&!p.adminDeleted);
  const ph=posts.length?(await Promise.all(posts.map(p=>buildPost(p)))).join(''):'<div class="empty"><div class="icon">📝</div><p>게시물이 없습니다</p></div>';

  pc.innerHTML=`
    <div class="prfhdr">
      <div class="prfrow">
        <div class="prfpic">${pfp}</div>
        <div class="prfstats">
          <div class="prfstat" onclick="showFL('${uid}','followers')"><div class="prfstat-n">${fol.length}</div><div class="prfstat-l">팔로워</div></div>
          <div class="prfstat" onclick="showFL('${uid}','following')"><div class="prfstat-n">${fing.length}</div><div class="prfstat-l">팔로잉</div></div>
        </div>
      </div>
      <div class="prfuid">${esc(uid)}${badge}</div>
      <div class="prfnick">${esc(u.nickname||'')}</div>
      ${u.bio?`<div class="prfbio" style="white-space:pre-wrap;">${renderText(u.bio)}</div>`:''}
      ${susBadge}
    </div>
    ${acts}
    <div class="prfposts">${ph}</div>`;
}
async function doFollow(uid){
  const target=await getU(uid); if(!target) return;
  CU.following=CU.following||[]; target.followers=target.followers||[];
  const wasF=CU.following.includes(uid);
  if(wasF){ CU.following=CU.following.filter(x=>x!==uid); target.followers=target.followers.filter(x=>x!==CU.id); }
  else{ CU.following.push(uid); target.followers.push(CU.id); await pushN(uid,'👥',`<strong>${CU.id}</strong>님이 회원님을 팔로우했습니다.`); }
  await setU(CU); await setU(target);
  await renderProfile(uid); toast(!wasF?`${uid}을(를) 팔로우했습니다.`:'팔로우 취소');
}
async function showFL(uid,type){
  const u=await getU(uid); if(!u) return;
  const list=type==='followers'?(u.followers||[]):(u.following||[]);
  document.getElementById('flist-title').textContent=type==='followers'?'팔로워':'팔로잉';
  const cont=document.getElementById('flist-cont');
  if(!list.length){cont.innerHTML='<div class="empty"><p>목록이 비어있습니다</p></div>';OM('m-flist');return;}
  const items=await Promise.all(list.map(async id=>{
    const lu=await getU(id);
    const img = lu&&lu.pfp ? resolveImg(lu.pfp) : '';
    const pi=img?`<img src="${img}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`:`<div style="width:40px;height:40px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);">${uid2init(id)}</div>`;
    const bdg = getBadgeHtml(lu);
    return `<div class="fitem" onclick="CM('m-flist');goProfile('${id}')"><div class="fiav">${pi}</div><div><div style="font-weight:700;font-size:13px;">${esc(id)}${bdg}</div><div style="font-size:11px;color:var(--ts);">${esc(lu?lu.nickname:'')}</div></div></div>`;
  }));
  cont.innerHTML=items.join(''); OM('m-flist');
}

function prevPfp(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ newPfpURL=e.target.result; document.getElementById('pe-pfp-prev').innerHTML=`<img src="${newPfpURL}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;">`; };
  r.readAsDataURL(f);

function resetPfp(){
  newPfpURL=null;
  newPfpReset=true;
  document.getElementById('pe-pfp-prev').innerHTML=
    `<span style="font-size:11px;color:var(--d);">✔ 저장 시 사진이 삭제됩니다</span>`;

}
async function savePE(){
  const errEl=document.getElementById('pe-err'); errEl.textContent='';
  const newId=document.getElementById('pe-id-new').value.trim();
  const newPw=document.getElementById('pe-pw-new').value;
  const newNick=document.getElementById('pe-nick').value.trim();
  const newBio=document.getElementById('pe-bio').value.trim();

  // 아이디 변경 요청
  if(newId && newId!==CU.id){
    if(!/^[a-zA-Z0-9_]{2,20}$/.test(newId)){errEl.textContent='아이디: 영문·숫자·_ 2~20자만 가능합니다.';return;}
    if(newId==='admin'){errEl.textContent='사용할 수 없는 아이디입니다.';return;}
    const ex=await getU(newId);
    if(ex){errEl.textContent='이미 사용 중인 아이디입니다.';return;}
    errEl.textContent='데이터 이전 중...';
    const oldId=CU.id;
    CU.id=newId;
    if(newPw) CU.password=newPw;
    CU.nickname=newNick; CU.bio=newBio;
    if(newPfpURL){ CU.pfp=await uploadImage(newPfpURL,'pfp/'+newId+'.jpg'); newPfpURL=null; }
    await setU(CU);

    // === 옛 아이디의 모든 데이터를 새 아이디로 이전 ===
    const allPosts=await getAllPosts();
    for(const p of allPosts){
      let changed=false;
      if(p.authorId===oldId){ p.authorId=newId; changed=true; }
      // 좋아요/싫어요/리트윗 배열 내 oldId 교체
      ['likes','dislikes','retweets','quotedBy'].forEach(k=>{
        if(Array.isArray(p[k]) && p[k].includes(oldId)){ p[k]=p[k].map(x=>x===oldId?newId:x); changed=true; }
      });
      // 댓글 작성자/반응
      if(Array.isArray(p.comments)){
        p.comments.forEach(c=>{
          if(c.authorId===oldId){ c.authorId=newId; changed=true; }
          ['likes','dislikes','retweets'].forEach(k=>{
            if(Array.isArray(c[k]) && c[k].includes(oldId)){ c[k]=c[k].map(x=>x===oldId?newId:x); changed=true; }
          });
        });
      }
      // 멘션 배열
      if(Array.isArray(p.mentions) && p.mentions.includes(oldId)){ p.mentions=p.mentions.map(x=>x===oldId?newId:x); changed=true; }
      if(changed) await setP(p);
    }
    // 스토리 이전
    const allStories=await getAllStories();
    for(const s of allStories){ if(s.authorId===oldId){ s.authorId=newId; await setS(s); } }
    // 팔로워/팔로잉 관계 이전: 나를 팔로우하던 사람들, 내가 팔로우하던 사람들의 목록에서 oldId→newId
    const allUsers=[await getU('admin'),...(await getAllUsers())].filter(Boolean);
    for(const u of allUsers){
      if(u.id===oldId) continue;
      let ch=false;
      if(Array.isArray(u.followers)&&u.followers.includes(oldId)){ u.followers=u.followers.map(x=>x===oldId?newId:x); ch=true; }
      if(Array.isArray(u.following)&&u.following.includes(oldId)){ u.following=u.following.map(x=>x===oldId?newId:x); ch=true; }
      if(ch) await setU(u);
    }

    // 옛 계정 문서 삭제
    try{ await deleteDoc(doc(db,'users',oldId)); }catch(e){}
    ls.saveUsers(ls.getUsers().filter(u=>u.id!==oldId));
    localStorage.setItem('mm_cur',newId);
    CM('m-pedit'); toast('아이디가 변경되었습니다. 다시 로그인해주세요.');
    doLogout(); return;
  }

  if(newPw) CU.password=newPw;
  CU.nickname=newNick; CU.bio=newBio;
  if(newPfpReset){ CU.pfp=''; newPfpReset=false; newPfpURL=null; }
  else if(newPfpURL){
    toast('프로필 사진 업로드 중...');
    CU.pfp=await uploadImage(newPfpURL,'pfp/'+CU.id+'.jpg'); newPfpURL=null;
  }
  await setU(CU); CM('m-pedit'); await renderProfile(CU.id); toast('프로필이 저장되었습니다!');
}

      </div>
      <button onclick="delAdAndRefresh('${ad.id}')" style="background:none;border:none;color:var(--d);cursor:pointer;font-size:16px;flex-shrink:0;">🗑</button>
    </div>`).join(''):'<div style="font-size:11px;color:var(--ts);">등록된 광고 없음</div>';

  document.getElementById('prcontent').innerHTML=`
    <div class="phdr" style="background:var(--d);"><button class="bkbtn" onclick="goProfile('admin')">‹</button><span class="phdr-t">관리자 설정</span></div>
    <div class="asec">
      <div class="acard" style="border-color:var(--pl);">
        <div class="actitle" style="color:var(--p);">📢 광고 관리</div>
        <div style="display:flex;gap:6px;margin-bottom:9px;">
          <button id="adtype-text" class="btn-p" style="flex:1;font-size:11px;background:var(--p);" onclick="setAdType('text')">📝 텍스트 광고</button>
          <button id="adtype-banner" class="btn-p" style="flex:1;font-size:11px;background:var(--ps);color:var(--p);" onclick="setAdType('banner')">🖼️ 배너 광고</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:11px;">
          <div id="ad-banner-box" style="display:none;">
            <input type="file" id="ad-banner-file" accept="image/*" style="display:none;" onchange="prevAdBanner(this)">
            <div id="ad-banner-prev" onclick="document.getElementById('ad-banner-file').click()" style="width:100%;height:80px;border:2px dashed var(--pl);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--ps);">
              <div style="text-align:center;color:var(--ts)"><div style="font-size:22px;">🖼️</div><div style="font-size:10px;margin-top:3px;">가로형 배너 이미지 선택</div></div>
            </div>
          </div>
          <textarea id="ad-text" placeholder="광고 문구 (배너는 선택사항)" style="width:100%;padding:8px 10px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;resize:none;min-height:56px;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <input id="ad-link" type="url" placeholder="연결할 링크 (예: https://...)" style="width:100%;padding:8px 10px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;">
          <button class="btn-p" style="font-size:12px;" onclick="submitAd()">📢 광고 업로드</button>
        </div>
        <div style="border-top:1px solid var(--b);padding-top:8px;">${adRows}</div>
      </div>
      <div class="acard"><div class="actitle">⚙️ 이용자 목록 (${users.length}명)</div>${rows||'<div style="font-size:11px;color:var(--ts);">가입자 없음</div>'}</div>
    </div>`;
  curAdType='text'; adBannerDataURL=null;
}
let curAdType='text', adBannerDataURL=null;
function setAdType(t){
  curAdType=t;
  document.getElementById('adtype-text').style.background = t==='text'?'var(--p)':'var(--ps)';
  document.getElementById('adtype-text').style.color = t==='text'?'#fff':'var(--p)';
  document.getElementById('adtype-banner').style.background = t==='banner'?'var(--p)':'var(--ps)';
  document.getElementById('adtype-banner').style.color = t==='banner'?'#fff':'var(--p)';
  document.getElementById('ad-banner-box').style.display = t==='banner'?'block':'none';
}
function prevAdBanner(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ adBannerDataURL=e.target.result; document.getElementById('ad-banner-prev').innerHTML=`<img src="${adBannerDataURL}" style="width:100%;height:80px;object-fit:cover;border-radius:7px;">`; };
  r.readAsDataURL(f);
}
async function submitAd(){
  const txt=document.getElementById('ad-text')?.value?.trim();
  const link=document.getElementById('ad-link')?.value?.trim();
  if(!link){toast('링크를 입력하세요.');return;}
  if(curAdType==='banner'){
    if(!adBannerDataURL){toast('배너 이미지를 선택하세요.');return;}
    toast('배너 업로드 중...');
    const imgUrl=await uploadImage(adBannerDataURL,'ads/'+gid()+'.jpg');
    const ad={id:gid(),type:'banner',image:imgUrl,text:txt||'',link,createdAt:Date.now()};
    await setAd(ad); adBannerDataURL=null;
  } else {
    if(!txt){toast('광고 문구를 입력하세요.');return;}
    const ad={id:gid(),type:'text',text:txt,link,createdAt:Date.now()};
    await setAd(ad);
  }
  toast('광고가 등록되었습니다!');
  await openAdmin();
}
async function delAdAndRefresh(adId){
  await delAd(adId); toast('광고가 삭제되었습니다.'); await openAdmin();
}
async function setSubAdmin(uid,val){
  if(!CU.isAdmin){ toast('최고 관리자만 부관리자를 설정할 수 있습니다.'); return; }
  const u=await getU(uid); if(!u) return;
  u.isSubAdmin=val; await setU(u);
  toast(val?`${uid} 부관리자 지정`:`${uid} 부관리자 해제`);
}
async function openSusMod(uid){
  susTgt=uid;
  const u=await getU(uid);
  document.getElementById('sus-info').textContent=`대상: ${uid} (${u?u.nickname:''})`;
  // 계정 삭제는 최고 관리자만
  document.getElementById('sus-del-wrap').style.display = CU.isAdmin ? 'block' : 'none';
  OM('m-sus');
}
async function doDeleteAccount(){
  if(!susTgt) return;
  if(!CU.isAdmin){ toast('최고 관리자만 계정을 삭제할 수 있습니다.'); return; }
  if(susTgt==='admin'){ toast('관리자 계정은 삭제할 수 없습니다.'); return; }
  if(!confirm(`'${susTgt}' 계정과 이 계정이 작성한 모든 글·댓글·스토리를 영구 삭제합니다. 되돌릴 수 없습니다. 진행할까요?`)) return;
  toast('계정 삭제 중...');
  const target=susTgt;

  // 1) 이 계정이 작성한 게시물 삭제 + 이 게시물을 인용/리트윗한 글도 삭제
  const allPosts=await getAllPosts();
  for(const p of allPosts){
    if(p.authorId===target){
      await delP(p.id);
      // 이 글을 리트윗/인용한 파생 글도 삭제
      for(const r of allPosts){ if(r.retweetOf===p.id||r.quoteOf===p.id) await delP(r.id); }
    }
  }
  // 2) 남은 게시물들에서 이 계정의 댓글·반응 제거
  const remaining=await getAllPosts();
  for(const p of remaining){
    let changed=false;
    ['likes','dislikes','retweets','quotedBy'].forEach(k=>{
      if(Array.isArray(p[k])&&p[k].includes(target)){ p[k]=p[k].filter(x=>x!==target); changed=true; }
    });
    if(Array.isArray(p.comments)){
      const before=p.comments.length;
      p.comments=p.comments.filter(c=>c.authorId!==target);
      if(p.comments.length!==before) changed=true;
      // 남은 댓글의 반응에서도 제거
      p.comments.forEach(c=>{
        ['likes','dislikes','retweets'].forEach(k=>{
          if(Array.isArray(c[k])&&c[k].includes(target)){ c[k]=c[k].filter(x=>x!==target); changed=true; }
        });
      });
    }
    if(changed) await setP(p);
  }
  // 3) 스토리 삭제
  const allStories=await getAllStories();
  for(const s of allStories){ if(s.authorId===target) await delS(s.id); }
  // 4) 팔로워/팔로잉 관계에서 제거
  const allUsers=[await getU('admin'),...(await getAllUsers())].filter(Boolean);
  for(const u of allUsers){
    if(u.id===target) continue;
    let ch=false;
    if(Array.isArray(u.followers)&&u.followers.includes(target)){ u.followers=u.followers.filter(x=>x!==target); ch=true; }
    if(Array.isArray(u.following)&&u.following.includes(target)){ u.following=u.following.filter(x=>x!==target); ch=true; }
    if(ch) await setU(u);
  }
  // 5) 계정 문서 삭제
  try{ await withTimeout(deleteDoc(doc(db,'users',target))); }catch(e){}
  ls.saveUsers(ls.getUsers().filter(u=>u.id!==target));

  CM('m-sus');
  toast(`'${target}' 계정이 삭제되었습니다.`);
  // 관리자 패널 또는 프로필 갱신
  goProfile('admin');
}
async function doSuspend(type){
  if(!susTgt) return; const u=await getU(susTgt); if(!u) return;
  if(type==='perm'){u.suspended={type:'perm'};toast(`${susTgt} 영구정지`);}
  else if(type==='days'){const d=parseInt(document.getElementById('sus-days').value);if(!d||d<1){toast('일수를 입력하세요');return;}u.suspended={type:'days',until:Date.now()+d*86400000};toast(`${susTgt} ${d}일 정지`);}
  else{u.suspended=null;toast(`${susTgt} 정지 해제`);}
  await setU(u); CM('m-sus'); await renderProfile(susTgt);
}

// ===== BADGE (admin only) =====
async function openBadgeMod(uid){
  document.getElementById('badge-uid').textContent=uid;
  const u=await getU(uid);
  document.getElementById('badge-inp').value=u?.badge||'';
  OM('m-badge');
}
async function saveBadge(){
  const uid=document.getElementById('badge-uid').textContent;
  const b=document.getElementById('badge-inp').value.trim();
  if(!b){toast('배지 내용을 입력하세요');return;}
  const u=await getU(uid); if(!u) return;
  u.badge=b; await setU(u); CM('m-badge'); await renderProfile(uid);
  toast(`${uid}에게 인증배지를 부여했습니다.`);
}
async function removeBadge(){
  const uid=document.getElementById('badge-uid').textContent;
  const u=await getU(uid); if(!u) return;
  delete u.badge; await setU(u); CM('m-badge'); await renderProfile(uid);
  toast('인증배지를 제거했습니다.');
}

// ===== POST INFO (admin) =====
async function showPInfo(pid){
  const p=await getP(pid); if(!p) return;
  const ts=tsToMs(p.createdAt);
  document.getElementById('pinfo-cont').innerHTML=`
    <div class="piitem"><div class="pilabel">⏰ 작성 시간</div><div class="pival">${fmtDateFull(ts)}</div></div>
    <div class="piitem"><div class="pilabel">🌐 브라우저</div><div class="pival">${esc(p.browser||'알 수 없음')}</div></div>
    <div class="piitem"><div class="pilabel">👤 작성자</div><div class="pival">${esc(p.authorId)}</div></div>`;
  OM('m-pinfo');
}

// ===== NOTIFICATIONS =====
function toggleNP(){
  const p=document.getElementById('npanel'); p.classList.toggle('open');
  if(p.classList.contains('open')) renderNP();
}
async function renderNP(){
  const ns=getNs();
  // mark all as read
  if(ns.some(n=>n.u)){
    CU.notifs=ns.map(n=>({...n,u:false}));
    await setU(CU); updNBadge();
  }
  const el=document.getElementById('nlist');
  if(!ns.length){
    el.innerHTML='<div class="empty" style="padding:18px;"><div class="icon" style="font-size:26px;">🔔</div><p>새로운 알림이 없습니다</p></div>';return;
  }
  el.innerHTML=ns.map(n=>`
    <div class="nitem ${n.u?'unread':''}">
      <div class="nitem-icon">${n.icon||'🔔'}</div>
      <div class="nitem-body"><div class="nitem-text">${n.text}</div><div class="nitem-time">${fmtDate(n.t)}</div></div>
    </div>`).join('');
}
async function clearNotifs(){
  CU.notifs=[];
  await setU(CU); updNBadge(); renderNP();
}

// ===== UTILS =====
function cc(el,cid){ const l=el.value.length; const e=document.getElementById(cid); if(!e)return; e.textContent=`${l} / 100`; e.className='ccount'+(l>90?' warn':''); }
function arta(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

// ===== EVENTS =====
window.addEventListener('click',e=>{
  if(e.target.classList.contains('moverlay')) CM(e.target.id);
  if(!e.target.closest('.pmore')) document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open'));
  if(!e.target.closest('#npanel')&&!e.target.closest('#nbtn')) document.getElementById('npanel').classList.remove('open');
});

// ===== INIT =====
window.addEventListener('load', async ()=>{
  // auth 화면은 항상 먼저 보여주고, 백그라운드에서 Firebase 초기화
  showScr('auth');
  document.getElementById('bnav').style.display='none';

  // 백그라운드 초기화 (실패해도 로그인 화면 유지)
  try { await getU('admin'); } catch(e){}
  try {
    const posts=await getAllPosts();
    if(!posts.length){
      await setP({id:gid(),authorId:'admin',content:'MIRAMIRA에 오신 것을 환영합니다! 💜\n게시물을 올려 사람들과 소통해보세요.',createdAt:Date.now(),likes:[],dislikes:[],retweets:[],comments:[],browser:'server',ip:'000.000'});
    }
  } catch(e){}

  // 자동 로그인 시도
  try {
    const saved=localStorage.getItem('mm_cur');
    if(saved){
      const u=await getU(saved);
      if(u){ CU=u; await enterApp(); return; }
      localStorage.removeItem('mm_cur');
    }
  } catch(e){ localStorage.removeItem('mm_cur'); }
});

// ===== EXPOSE to window (required for inline onclick in module script) =====
Object.assign(window,{
  switchTab,doLogin,doRegister,doLogout,
  navTo,goProfile,
  switchFeedTab,
  openUpload,openPostM,openStoryM,prevStory,submitPost,submitStory,
  viewStory,closeSTV,storySkip,deleteMyStory,
  toggleCm,toggleDD,doLike,doDislike,
  openRTMenu,openQRT,submitQRT,doRetweet,
  editPost,delPost,hidePost,
  submitCm,editCm,delCm,cmLike,cmDislike,cmRetweet,showCInfo,
  doSearch,scrollToPost,searchHashtag,
  renderProfile,doFollow,showFL,
  openPE,prevPfp,resetPfp,savePE,
  openAdmin,setSubAdmin,openSusMod,doSuspend,doDeleteAccount,
  submitAd,delAdAndRefresh,setAdType,prevAdBanner,
  openBadgeMod,saveBadge,removeBadge,
  showPInfo,
  toggleNP,clearNotifs,
  OM,CM,cc,arta
});
</script>
