<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRAMIRA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--p:#7B5EA7;--pd:#5C3D8F;--pl:#A688D4;--pbg:#F3EEF9;--ps:#EDE5F7;--d:#EF4444;--s:#22C55E;--t:#1e1e2e;--ts:#6b6b8a;--b:#DDD6F3;--bg:#F8F5FC;--sh:0 2px 16px rgba(123,94,167,.10);--shl:0 8px 32px rgba(123,94,167,.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}
input,textarea,button{font-family:'Noto Sans KR',sans-serif;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
/* AUTH */
#auth-screen{background:linear-gradient(160deg,var(--pbg) 0%,#fff 60%,var(--ps) 100%);align-items:center;justify-content:center;padding:24px;}
.auth-box{width:100%;max-width:420px;}
.logo-wrap{text-align:center;margin-bottom:32px;}
.auth-tabs{display:flex;background:var(--ps);border-radius:14px;padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;color:var(--p);transition:.2s;}
.auth-tab.active{background:var(--p);color:#fff;}
.auth-form{display:none;flex-direction:column;gap:13px;}
.auth-form.active{display:flex;}
.ig{display:flex;flex-direction:column;gap:5px;}
.ig label{font-size:12px;font-weight:700;color:var(--pd);letter-spacing:.4px;}
.ig input{padding:12px 14px;border:2px solid var(--b);border-radius:12px;font-size:14px;transition:.2s;background:#fff;}
.ig input:focus{outline:none;border-color:var(--p);}
.btn-p{background:var(--p);color:#fff;border:none;padding:13px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;transition:.2s;}
.btn-p:hover{background:var(--pd);}
.btn-o{background:none;border:2px solid var(--p);color:var(--p);padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-do{background:none;border:2px solid var(--d);color:var(--d);padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-f{background:var(--p);color:#fff;border:none;padding:8px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-f.ing{background:#fff;color:var(--p);border:2px solid var(--p);}
.btn-sec{background:var(--bg);color:var(--ts);border:none;padding:12px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;}
.aerr{color:var(--d);font-size:13px;text-align:center;min-height:16px;}
/* TOPBAR */
#main-screen{padding-bottom:70px;overflow-y:auto;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.nb{position:relative;background:none;border:none;cursor:pointer;padding:5px;color:var(--ts);display:flex;}
.nb svg{width:22px;height:22px;}
.nbadge{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--d);border-radius:50%;border:2px solid #fff;display:none;}
.nbadge.on{display:block;}
.npanel{display:none;position:fixed;top:52px;right:6px;width:310px;max-width:calc(100vw - 12px);background:#fff;border:1px solid var(--b);border-radius:14px;box-shadow:var(--shl);z-index:200;max-height:400px;overflow-y:auto;}
.npanel.open{display:block;}
.nphead{padding:12px 14px 8px;font-weight:800;font-size:13px;color:var(--pd);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b);}
.npclear{background:none;border:none;font-size:11px;color:var(--ts);cursor:pointer;font-weight:700;}
.nitem{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b);cursor:pointer;}
.nitem.unread{background:var(--ps);}
.nitem-icon{font-size:18px;flex-shrink:0;}
.nitem-body{flex:1;}
.nitem-text{font-size:12px;line-height:1.4;color:var(--t);}
.nitem-text strong{color:var(--pd);}
.nitem-time{font-size:10px;color:var(--ts);margin-top:2px;}
/* STORIES */
.sw{padding:12px 0 6px;overflow-x:auto;display:flex;gap:10px;padding-left:14px;scrollbar-width:none;}
.sw::-webkit-scrollbar{display:none;}
.si{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;}
.sr{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--p),#C084FC);padding:3px;}
.sav{width:100%;height:100%;border-radius:50%;border:2px solid #fff;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:var(--p);overflow:hidden;}
.sav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sname{font-size:10px;color:var(--ts);max-width:62px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sadd{width:58px;height:58px;border-radius:50%;background:var(--ps);border:2px dashed var(--pl);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--p);}
/* FEED */
.feed{padding:6px 10px;display:flex;flex-direction:column;gap:10px;}
.pc{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--sh);border:1px solid var(--b);}
.pc.adel{border-color:#fca5a5;background:#fff5f5;}
.ph{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.pav{width:38px;height:38px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);cursor:pointer;flex-shrink:0;overflow:hidden;}
.pav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pmeta{flex:1;}
.puid{font-weight:700;font-size:13px;color:var(--pd);cursor:pointer;}
.puid:hover{text-decoration:underline;}
.pdate{font-size:10px;color:var(--ts);}
.pmore{position:relative;}
.mbtn{background:none;border:none;cursor:pointer;color:var(--ts);font-size:17px;padding:3px;border-radius:5px;}
.mbtn:hover{background:var(--ps);}
.dd{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--b);border-radius:10px;box-shadow:var(--shl);z-index:50;min-width:120px;overflow:hidden;}
.dd.open{display:block;}
.ddi{padding:9px 14px;font-size:13px;cursor:pointer;white-space:nowrap;}
.ddi:hover{background:var(--ps);color:var(--p);}
.ddi.danger{color:var(--d);}
.pcont{font-size:14px;line-height:1.6;color:var(--t);margin-bottom:10px;white-space:pre-wrap;}
.pcont.adel{color:var(--d);font-weight:700;font-size:13px;}
.rtinfo{font-size:11px;color:var(--pl);margin-bottom:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.pacts{display:flex;border-top:1px solid var(--b);margin-top:6px;padding-top:6px;}
.abt{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 2px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--ts);border-radius:7px;font-weight:600;}
.abt:hover{background:var(--ps);color:var(--p);}
.abt.lk{color:#E91E8C;}
.abt.dk{color:var(--d);}
.abt.rk{color:var(--p);}
/* COMMENTS */
.cmsec{margin-top:10px;border-top:1px solid var(--b);padding-top:8px;display:flex;flex-direction:column;gap:7px;}
.cc{background:var(--pbg);border-radius:9px;padding:9px 11px;}
.ch{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.cav{width:26px;height:26px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--p);cursor:pointer;flex-shrink:0;}
.cuid{font-weight:700;font-size:11px;color:var(--pd);cursor:pointer;}
.cuid:hover{text-decoration:underline;}
.cdate{font-size:10px;color:var(--ts);margin-left:auto;}
.ccont{font-size:12px;line-height:1.5;white-space:pre-wrap;}
.cacts{display:flex;gap:6px;margin-top:5px;}
.cabt{background:none;border:none;font-size:10px;color:var(--ts);cursor:pointer;display:flex;align-items:center;gap:2px;padding:2px 5px;border-radius:5px;font-weight:600;}
.cabt:hover{background:rgba(123,94,167,.1);color:var(--p);}
.cabt.lk{color:#E91E8C;}
.cabt.dk{color:var(--d);}
.cir{display:flex;gap:7px;align-items:flex-end;margin-top:7px;}
.cinput{flex:1;padding:8px 10px;border:2px solid var(--b);border-radius:9px;font-size:12px;resize:none;min-height:34px;max-height:70px;}
.cinput:focus{outline:none;border-color:var(--p);}
.csub{background:var(--p);color:#fff;border:none;padding:7px 12px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;}
.tcbtn{background:none;border:none;color:var(--p);font-size:11px;font-weight:700;cursor:pointer;padding:3px 0;margin-top:1px;}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--b);display:flex;z-index:100;padding:3px 0 5px;}
.nnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px;border:none;background:none;cursor:pointer;color:var(--ts);font-size:9px;font-weight:700;}
.nnbtn.active{color:var(--p);}
.nnbtn svg{width:22px;height:22px;}
.nnbtn.upbtn{background:var(--p);border-radius:14px;color:#fff;margin:2px 6px;}
/* SEARCH */
#search-screen{overflow-y:auto;}
.shdr{padding:12px;background:#fff;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:10;}
.siwrap{position:relative;}
.siwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ts);width:17px;height:17px;}
.sinput{width:100%;padding:10px 12px 10px 40px;border:2px solid var(--b);border-radius:11px;font-size:13px;background:var(--bg);}
.sinput:focus{outline:none;border-color:var(--p);background:#fff;}
.sres{padding:10px;}
.stitle{font-size:11px;font-weight:800;color:var(--p);letter-spacing:.5px;margin:8px 0 4px;}
.uri{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border-radius:11px;border:1px solid var(--b);cursor:pointer;margin-bottom:6px;}
.uri:hover{border-color:var(--pl);}
/* PROFILE */
#profile-screen{overflow-y:auto;}
.prfhdr{background:var(--p);padding:20px 14px 14px;color:#fff;}
.prfrow{display:flex;align-items:flex-end;gap:14px;margin-bottom:10px;}
.prfpic{width:76px;height:76px;border-radius:50%;border:3px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;overflow:hidden;}
.prfpic img{width:100%;height:100%;object-fit:cover;}
.prfstats{display:flex;gap:18px;flex:1;justify-content:flex-end;}
.prfstat{text-align:center;cursor:pointer;}
.prfstat-n{font-size:19px;font-weight:800;}
.prfstat-l{font-size:10px;opacity:.8;}
.prfuid{font-size:17px;font-weight:800;}
.prfnick{font-size:13px;opacity:.8;margin-top:2px;}
.prfbio{font-size:12px;opacity:.75;margin-top:5px;line-height:1.4;}
.prfacts{display:flex;gap:7px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--b);flex-wrap:wrap;}
.prfposts{padding:10px;}
.susbadge{background:#fef2f2;border:1px solid #fca5a5;color:var(--d);padding:3px 8px;border-radius:7px;font-size:11px;font-weight:700;display:inline-block;margin-top:6px;}
.ubadge{display:inline;font-size:14px;margin-left:3px;}
/* STORY VIEWER */
.stv{display:none;position:fixed;inset:0;background:#000;z-index:300;flex-direction:column;}
.stv.open{display:flex;}
.stpbars{display:flex;gap:3px;padding:9px 10px 5px;}
.stpbar{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.stpfill{height:100%;background:#fff;width:0%;transition:width 5s linear;}
.stvhdr{display:flex;align-items:center;gap:9px;padding:7px 10px;}
.stvav{width:34px;height:34px;border-radius:50%;border:2px solid #fff;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);font-size:13px;}
.stvname{color:#fff;font-weight:700;font-size:13px;flex:1;}
.stvtime{color:rgba(255,255,255,.7);font-size:11px;}
.stvcls{color:#fff;background:none;border:none;font-size:22px;cursor:pointer;}
.stimgwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;position:relative;}
.stimgwrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:7px;}
.sttap{position:absolute;top:0;height:100%;width:35%;z-index:10;cursor:pointer;}
.sttap.left{left:0;}
.sttap.right{right:0;}
/* MODALS */
.moverlay{display:none;position:fixed;inset:0;background:rgba(30,20,50,.5);backdrop-filter:blur(3px);z-index:200;align-items:flex-end;justify-content:center;}
.moverlay.center{align-items:center;padding:14px;}
.moverlay.open{display:flex;}
.mbox{background:#fff;border-radius:18px 18px 0 0;padding:20px 18px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.moverlay.center .mbox{border-radius:18px;}
.mtitle{font-size:15px;font-weight:800;color:var(--pd);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.mcls{background:none;border:none;cursor:pointer;color:var(--ts);font-size:20px;line-height:1;}
.macts{display:flex;gap:9px;margin-top:14px;}
.macts .btn-p{flex:1;}
.uptbtns{display:flex;gap:10px;}
.uptbtn{flex:1;padding:18px;border:2px solid var(--b);border-radius:13px;background:#fff;cursor:pointer;text-align:center;}
.uptbtn:hover{border-color:var(--p);background:var(--ps);}
.uptbtn .icon{font-size:30px;margin-bottom:7px;}
.uptbtn .lbl{font-weight:700;font-size:13px;color:var(--pd);}
.mta{width:100%;padding:10px 12px;border:2px solid var(--b);border-radius:11px;font-size:13px;resize:none;min-height:90px;}
.mta:focus{outline:none;border-color:var(--p);}
.ccount{text-align:right;font-size:11px;color:var(--ts);margin-top:3px;}
.ccount.warn{color:var(--d);}
/* ADMIN */
.asec{padding:10px 14px;}
.acard{background:#fff;border-radius:13px;border:2px solid #fca5a5;padding:14px;margin-bottom:10px;}
.actitle{font-size:13px;font-weight:800;color:var(--d);margin-bottom:10px;}
.uarow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b);}
.uarow:last-child{border-bottom:none;}
.uainfo{font-size:12px;}
.uaid{font-weight:700;}
.uapw{color:var(--ts);font-size:11px;}
.tsw{position:relative;width:38px;height:20px;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:20px;cursor:pointer;transition:.2s;}
.tsl:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.tsw input:checked+.tsl{background:var(--p);}
.tsw input:checked+.tsl:before{transform:translateX(18px);}
/* POST INFO */
.pirow{display:flex;flex-direction:column;gap:9px;}
.piitem{background:var(--pbg);border-radius:9px;padding:10px 12px;}
.pilabel{font-size:10px;font-weight:800;color:var(--p);letter-spacing:.4px;margin-bottom:3px;}
.pival{font-size:13px;font-weight:600;color:var(--t);}
/* MISC */
.empty{text-align:center;padding:36px 18px;color:var(--ts);}
.empty .icon{font-size:36px;margin-bottom:7px;}
.empty p{font-size:13px;}
.phdr{display:flex;align-items:center;gap:9px;padding:13px 14px;background:var(--p);color:#fff;}
.phdr-t{font-weight:800;font-size:15px;}
.bkbtn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.flist{padding:10px;}
.fitem{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border-radius:11px;border:1px solid var(--b);cursor:pointer;margin-bottom:6px;}
.fitem:hover{border-color:var(--pl);}
.fiav{width:42px;height:42px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);overflow:hidden;}
.fiav img{width:100%;height:100%;object-fit:cover;}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--pd);color:#fff;padding:9px 18px;border-radius:11px;font-size:12px;font-weight:700;z-index:500;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.einput{width:100%;padding:8px 9px;border:2px solid var(--pl);border-radius:7px;font-size:12px;margin-top:3px;}
.einput:focus{outline:none;border-color:var(--p);}
.susp-opts{display:flex;flex-direction:column;gap:7px;}
.susp-opt{padding:11px;border:2px solid var(--b);border-radius:9px;cursor:pointer;font-weight:600;font-size:13px;text-align:center;}
.susp-opt:hover{border-color:var(--d);color:var(--d);background:#fff5f5;}
.susp-di{display:flex;gap:7px;align-items:center;}
.susp-di input{flex:1;padding:9px;border:2px solid var(--b);border-radius:9px;font-size:13px;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="logo-wrap">
      <svg width="200" height="56" viewBox="0 0 310 80"><text x="8" y="60" font-family="'Nunito',sans-serif" font-weight="900" font-size="60" fill="#7B5EA7" letter-spacing="-2">MIRAMIRA</text><rect x="240" y="12" width="62" height="46" rx="7" fill="#7B5EA7"/><text x="271" y="33" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">I LOVE</text><text x="271" y="48" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">YOU</text><polygon points="260,58 271,72 282,58" fill="#7B5EA7"/></svg>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
      <div class="auth-tab" id="tab-reg" onclick="switchTab('reg')">회원가입</div>
    </div>
    <div class="auth-form active" id="form-login">
      <div class="ig"><label>아이디</label><input id="li-id" type="text" placeholder="아이디 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="ig"><label>비밀번호</label><input id="li-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="aerr" id="li-err"></div>
      <button class="btn-p" onclick="doLogin()">로그인</button>
    </div>
    <div class="auth-form" id="form-reg">
      <div class="ig"><label>아이디</label><input id="rg-id" type="text" placeholder="사용할 아이디 입력"></div>
      <div class="ig"><label>비밀번호</label><input id="rg-pw" type="password" placeholder="비밀번호 입력"></div>
      <div class="ig"><label>가상국가 활동명</label><input id="rg-nick" type="text" placeholder="활동명 입력"></div>
      <div class="aerr" id="rg-err"></div>
      <button class="btn-p" onclick="doRegister()">회원가입</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen" class="screen">
  <div class="topbar">
    <svg width="100" height="28" viewBox="0 0 310 80"><text x="8" y="60" font-family="'Nunito',sans-serif" font-weight="900" font-size="60" fill="#7B5EA7" letter-spacing="-2">MIRAMIRA</text><rect x="240" y="12" width="62" height="46" rx="7" fill="#7B5EA7"/><text x="271" y="33" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">I LOVE</text><text x="271" y="48" font-family="'Nunito',sans-serif" font-weight="800" font-size="11" fill="white" text-anchor="middle">YOU</text><polygon points="260,58 271,72 282,58" fill="#7B5EA7"/></svg>
    <div class="topbar-right">
      <button class="nb" id="nbtn" onclick="toggleNP()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="nbadge" id="nbadge"></span>
      </button>
      <span style="font-size:11px;color:var(--pd);font-weight:700;" id="topbar-uid"></span>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDIffZz4ImYy9wlUujnirN4jk5ObYp7PNw",
  authDomain:"miramira-9a34c.firebaseapp.com",
  projectId:"miramira-9a34c",
  storageBucket:"miramira-9a34c.firebasestorage.app",
  messagingSenderId:"506476561553",
  appId:"1:506476561553:web:8dbb3b232df753e5536b30"
});
const db = getFirestore(app);

// ===== DB HELPERS =====
const ADMIN_DEF = {id:'admin',password:'admin',nickname:'관리자',bio:'MIRAMIRA 운영자',pfp:'',isAdmin:true,isSubAdmin:false,followers:[],following:[],suspended:null};
async function getU(id) {
  if(!id) return null;
  const s = await getDoc(doc(db,'users',id));
  if(s.exists()) return s.data();
  if(id==='admin') { await setDoc(doc(db,'users','admin'),ADMIN_DEF); return ADMIN_DEF; }
  return null;
}
async function setU(u) { await setDoc(doc(db,'users',u.id),u); }
async function getAllUsers() { const s=await getDocs(collection(db,'users')); return s.docs.map(d=>d.data()).filter(u=>u.id!=='admin'); }
async function getP(id) { const s=await getDoc(doc(db,'posts',id)); return s.exists()?s.data():null; }
async function setP(p) { await setDoc(doc(db,'posts',p.id),p); }
async function delP(id) { await deleteDoc(doc(db,'posts',id)); }
async function getAllPosts() { const s=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc'))); return s.docs.map(d=>d.data()); }
async function getAllStories() { const s=await getDocs(collection(db,'stories')); return s.docs.map(d=>d.data()); }
async function setS(s) { await setDoc(doc(db,'stories',s.id),s); }
async function delS(id) { await deleteDoc(doc(db,'stories',id)); }
async function cleanStories() {
  const now=Date.now(); const all=await getAllStories();
  for(const s of all){ const t=s.createdAt?.seconds?s.createdAt.seconds*1000:s.createdAt; if(now-t>=86400000) await delS(s.id); }
}

// ===== STATE =====
let CU = null; // current user cache
let curScreen='main';
let editPid=null, editCid=null;
let susTgt=null;
let svStories=[], svIdx=0, svTimer=null;
let storyDataURL=null, newPfpURL=null;

function uid2init(id){ return (id||'??').substring(0,2).toUpperCase(); }
function pfpHtml(u,sz=38){ const s=sz+'px'; return u&&u.pfp?`<img src="${u.pfp}" alt="" style="width:${s};height:${s};object-fit:cover;border-radius:50%;">`:`<span style="font-size:${Math.floor(sz/2.2)}px;">${uid2init(u?u.id:'?')}</span>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts){ const t=ts?.seconds?ts.seconds*1000:ts; const d=Date.now()-t; if(d<60000)return '방금 전'; if(d<3600000)return Math.floor(d/60000)+'분 전'; if(d<86400000)return Math.floor(d/3600000)+'시간 전'; const dd=new Date(t); return `${dd.getFullYear()}.${dd.getMonth()+1}.${dd.getDate()}`; }
function fmtDateFull(ts){ const t=ts?.seconds?ts.seconds*1000:ts; const d=new Date(t); return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`; }
function gid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function getBrowser(){ const ua=navigator.userAgent; if(ua.includes('Edg'))return 'Edge'; if(ua.includes('Chrome'))return 'Chrome'; if(ua.includes('Firefox'))return 'Firefox'; if(ua.includes('Safari'))return 'Safari'; return '기타'; }
function isSus(u){ if(!u||!u.suspended)return false; if(u.suspended.type==='perm')return true; if(u.suspended.type==='days')return Date.now()<u.suspended.until; return false; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function OM(id){ document.getElementById(id).classList.add('open'); }
function CM(id){ document.getElementById(id).classList.remove('open'); }
function showScr(n){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(n+'-screen').classList.add('active'); curScreen=n; }
// notifs (localStorage per user)
function getNs(){ return JSON.parse(localStorage.getItem('mm_n_'+(CU?CU.id:''))||'[]'); }
function setNs(n){ localStorage.setItem('mm_n_'+(CU?CU.id:''),JSON.stringify(n)); }
function pushN(targetId,icon,text){ const k='mm_n_'+targetId; const l=JSON.parse(localStorage.getItem(k)||'[]'); l.unshift({id:gid(),icon,text,t:Date.now(),u:true}); if(l.length>50)l.length=50; localStorage.setItem(k,JSON.stringify(l)); if(CU&&targetId===CU.id)updNBadge(); }
function updNBadge(){ const ns=getNs(); document.getElementById('nbadge').classList.toggle('on',ns.some(n=>n.u)); }

// ===== AUTH =====
function switchTab(t){ document.getElementById('tab-login').classList.toggle('active',t==='login'); document.getElementById('tab-reg').classList.toggle('active',t==='reg'); document.getElementById('form-login').classList.toggle('active',t==='login'); document.getElementById('form-reg').classList.toggle('active',t==='reg'); }
async function doLogin(){
  const id=document.getElementById('li-id').value.trim();
  const pw=document.getElementById('li-pw').value;
  const err=document.getElementById('li-err');
  err.textContent='';
  if(!id||!pw){err.textContent='아이디와 비밀번호를 입력하세요.';return;}
  const u=await getU(id);
  if(!u||u.password!==pw){err.textContent='아이디 또는 비밀번호가 틀렸습니다.';return;}
  CU=u; localStorage.setItem('mm_cur',id);
  await enterApp();
}
async function doRegister(){
  const id=document.getElementById('rg-id').value.trim();
  const pw=document.getElementById('rg-pw').value;
  const nick=document.getElementById('rg-nick').value.trim();
  const err=document.getElementById('rg-err');
  err.textContent='';
  if(!id||!pw||!nick){err.textContent='모든 항목을 입력하세요.';return;}
  if(id==='admin'){err.textContent='사용할 수 없는 아이디입니다.';return;}
  const ex=await getU(id);
  if(ex){err.textContent='이미 사용 중인 아이디입니다.';return;}
  const nu={id,password:pw,nickname:nick,bio:'',pfp:'',isAdmin:false,isSubAdmin:false,followers:[],following:[],suspended:null};
  await setU(nu); toast('회원가입 완료! 로그인하세요.'); switchTab('login');
  document.getElementById('li-id').value=id;
}
function doLogout(){ CU=null; localStorage.removeItem('mm_cur'); document.getElementById('bnav').style.display='none'; showScr('auth'); }

// ===== APP =====
async function enterApp(){
  await cleanStories();
  document.getElementById('topbar-uid').textContent=CU.id;
  document.getElementById('bnav').style.display='flex';
  showScr('main');
  document.querySelectorAll('.nnbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
  updNBadge();
  await renderFeed();
}
async function navTo(n){
  document.querySelectorAll('.nnbtn:not(.upbtn)').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+n)?.classList.add('active');
  if(n==='main'){ showScr('main'); await renderFeed(); }
  else if(n==='search'){ showScr('search'); }
  else if(n==='profile'){ showScr('profile'); await renderProfile(CU.id); }
}
async function goProfile(uid){ showScr('profile'); document.querySelectorAll('.nnbtn:not(.upbtn)').forEach(b=>b.classList.remove('active')); document.getElementById('nav-profile')?.classList.add('active'); await renderProfile(uid); }

// ===== FEED =====
async function renderFeed(){
  await renderStories();
  let posts=(await getAllPosts()).filter(p=>!p.isDeleted);
  posts.sort((a,b)=>{
    const at=a.createdAt?.seconds?a.createdAt.seconds*1000:a.createdAt;
    const bt=b.createdAt?.seconds?b.createdAt.seconds*1000:b.createdAt;
    const af=(CU.following||[]).includes(a.authorId)?1:0;
    const bf=(CU.following||[]).includes(b.authorId)?1:0;
    if(bf!==af)return bf-af; return bt-at;
  });
  const feed=document.getElementById('feed');
  if(!posts.length){feed.innerHTML='<div class="empty"><div class="icon">✨</div><p>아직 게시물이 없어요</p></div>';return;}
  const htmls=await Promise.all(posts.map(p=>buildPost(p)));
  feed.innerHTML=htmls.join('');
}
async function renderStories(){
  await cleanStories();
  const all=await getAllStories();
  const byU={};
  all.forEach(s=>{if(!byU[s.authorId])byU[s.authorId]=[];byU[s.authorId].push(s);});
  let h=`<div class="si"><div class="sadd" onclick="openStoryM()">+</div><div class="sname">내 스토리</div></div>`;
  const ord=Object.keys(byU).sort((a,b)=>((CU.following||[]).includes(b)?1:0)-((CU.following||[]).includes(a)?1:0));
  for(const uid of ord){
    const u=await getU(uid); if(!u)continue;
    const p=u.pfp?`<img src="${u.pfp}" alt="">`:`<span style="font-size:18px;">${uid2init(uid)}</span>`;
    h+=`<div class="si" onclick="viewStory('${uid}')"><div class="sr"><div class="sav">${p}</div></div><div class="sname">${esc(uid)}</div></div>`;
  }
  document.getElementById('sw').innerHTML=h;
}

async function buildPost(post){
  const author=await getU(post.authorId);
  const id=post.authorId;
  const ts=post.createdAt?.seconds?post.createdAt.seconds*1000:post.createdAt;
  const likes=post.likes||[]; const dislikes=post.dislikes||[]; const retweets=post.retweets||[]; const comments=post.comments||[];
  const isOwn=CU.id===id; const isAd=CU.isAdmin||CU.isSubAdmin; const sus=isSus(CU);
  const badge=author&&author.badge?`<span class="ubadge">${esc(author.badge)}</span>`:'';
  const pfp=author&&author.pfp?`<img src="${author.pfp}" alt="">`:`<span style="font-size:15px;">${uid2init(id)}</span>`;

  // more menu
  let more='';
  if(isOwn&&!post.adminDeleted){
    more=`<div class="pmore"><button class="mbtn" onclick="toggleDD('dd-${post.id}')">⋯</button><div class="dd" id="dd-${post.id}"><div class="ddi" onclick="editPost('${post.id}');toggleDD('dd-${post.id}')">수정</div><div class="ddi danger" onclick="delPost('${post.id}',false);toggleDD('dd-${post.id}')">삭제</div></div></div>`;
  } else if(isAd&&!post.adminDeleted){
    let items=`<div class="ddi" onclick="showPInfo('${post.id}');toggleDD('dd-${post.id}')">📋 게시물 정보</div>`;
    if(!isOwn) items=`<div class="ddi danger" onclick="delPost('${post.id}',true);toggleDD('dd-${post.id}')">관리자 삭제</div>`+items;
    more=`<div class="pmore"><button class="mbtn" onclick="toggleDD('dd-${post.id}')">⋯</button><div class="dd" id="dd-${post.id}">${items}</div></div>`;
  }

  // retweet info
  let rtInfo='';
  if(post.retweetOf){
    const orig=await getP(post.retweetOf);
    const oa=orig?orig.authorId:'(삭제됨)';
    rtInfo=`<div class="rtinfo">🔁 <strong>${esc(id)}</strong>님이 <strong>@${esc(oa)}</strong>의 글을 리트윗했습니다${orig?` <button onclick="scrollToPost('${post.retweetOf}')" style="background:var(--ps);border:none;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:700;color:var(--p);cursor:pointer;">원본 보기</button>`:''}`;
  }

  // content
  let cont='';
  if(post.adminDeleted) cont=`<div class="pcont adel">🚫 운영약관을 위반한 게시물이 삭제되었습니다</div>`;
  else cont=`<div class="pcont">${esc(post.content)}</div>`;

  // actions
  let acts='';
  if(!post.adminDeleted){
    if(isOwn||sus){
      acts=`<div class="pacts"><button class="abt" onclick="toggleCm('${post.id}')">💬 ${comments.length}</button><span class="abt" style="cursor:default;">👍 ${likes.length}</span><span class="abt" style="cursor:default;">👎 ${dislikes.length}</span></div>`;
    } else {
      acts=`<div class="pacts">
        <button class="abt" onclick="toggleCm('${post.id}')">💬 ${comments.length}</button>
        <button class="abt${retweets.includes(CU.id)?' rk':''}" onclick="doRetweet('${post.id}')">🔁 ${retweets.length}</button>
        <button class="abt${likes.includes(CU.id)?' lk':''}" onclick="doLike('${post.id}')">👍 ${likes.length}</button>
        <button class="abt${dislikes.includes(CU.id)?' dk':''}" onclick="doDislike('${post.id}')">👎 ${dislikes.length}</button>
      </div>`;
    }
  }

  // comments section
  const cHtml=buildCommentsSec(post);

  return `<div class="pc${post.adminDeleted?' adel':''}" id="pc-${post.id}">
    ${rtInfo}
    <div class="ph">
      <div class="pav" onclick="goProfile('${id}')">${pfp}</div>
      <div class="pmeta"><div class="puid" onclick="goProfile('${id}')">${esc(id)}${badge}</div><div class="pdate">${fmtDate(ts)}</div></div>
      ${more}
    </div>
    ${cont}${acts}${cHtml}
  </div>`;
}

function buildCommentsSec(post){

function buildComment(pid,c){
  const isOwn=CU.id===c.authorId; const isAd=CU.isAdmin||CU.isSubAdmin; const sus=isSus(CU);
  const lk=c.likes||[]; const dk=c.dislikes||[]; const rt=c.retweets||[];
  let acts='';
  if(!sus){acts=`<button class="cabt${lk.includes(CU.id)?' lk':''}" onclick="cmLike('${pid}','${c.id}')">👍 ${lk.length}</button><button class="cabt${dk.includes(CU.id)?' dk':''}" onclick="cmDislike('${pid}','${c.id}')">👎 ${dk.length}</button><button class="cabt${rt.includes(CU.id)?' rk':''}" onclick="cmRetweet('${pid}','${c.id}')">🔁 ${rt.length}</button>`;}
  if(isOwn) acts+=`<button class="cabt" onclick="editCm('${pid}','${c.id}')">수정</button><button class="cabt" style="color:var(--d);" onclick="delCm('${pid}','${c.id}',false)">삭제</button>`;
  else if(isAd) acts+=`<button class="cabt" style="color:var(--d);" onclick="delCm('${pid}','${c.id}',true)">관리자삭제</button>`;
  return `<div class="cc" id="cc-${c.id}"><div class="ch"><div class="cav" onclick="goProfile('${c.authorId}')">${uid2init(c.authorId)}</div><div class="cuid" onclick="goProfile('${c.authorId}')">${esc(c.authorId)}</div><div class="cdate">${fmtDate(c.createdAt)}</div></div><div class="ccont">${esc(c.content)}</div><div class="cacts">${acts}</div></div>`;
}

async function doSearch(){
  const q=document.getElementById('sinput').value.trim().toLowerCase();
  const res=document.getElementById('sres');
  if(!q){res.innerHTML='<div class="empty"><div class="icon">🔍</div><p>검색어를 입력하세요</p></div>';return;}
  const users=[await getU('admin'),...(await getAllUsers())];
  const mu=users.filter(u=>u&&(u.id.toLowerCase().includes(q)||(u.nickname||'').toLowerCase().includes(q)));
  const posts=(await getAllPosts()).filter(p=>!p.adminDeleted&&!p.isDeleted&&(p.content||'').toLowerCase().includes(q));
  let h='';
  if(mu.length){
    h+=`<div class="stitle">👤 사용자</div>`;
    h+=mu.map(u=>{
      const p=u.pfp?`<img src="${u.pfp}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;">`:`<div style="width:42px;height:42px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);">${uid2init(u.id)}</div>`;
      const badge=u.badge?`<span class="ubadge">${esc(u.badge)}</span>`:'';
      return `<div class="uri" onclick="goProfile('${u.id}')">${p}<div><div style="font-weight:700;font-size:13px;">${esc(u.id)}${badge}</div><div style="font-size:11px;color:var(--ts);">${esc(u.nickname)}</div></div></div>`;
    }).join('');
  }
  if(posts.length){
    h+=`<div class="stitle">📝 게시물</div>`;
    const ph=await Promise.all(posts.map(p=>buildPost(p)));
    h+=ph.join('');
  }
  if(!mu.length&&!posts.length) h='<div class="empty"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>';
  res.innerHTML=h;
}

  }

  else{CU.following.push(uid);target.followers.push(CU.id);pushN(uid,'👥',`<strong>${CU.id}</strong>님이 회원님을 팔로우했습니다.`);}

async function openAdmin(){
  const users=await getAllUsers();
  let rows=users.map(u=>`<div class="uarow"><div class="uainfo"><div class="uaid">${esc(u.id)}</div><div class="uapw">PW: ${esc(u.password)}</div>${u.suspended?`<div style="font-size:10px;color:var(--d);">${u.suspended.type==='perm'?'영구정지':`${Math.ceil((u.suspended.until-Date.now())/86400000)}일 정지`}</div>`:''}</div><div style="display:flex;align-items:center;gap:7px;"><span style="font-size:11px;color:var(--ts);">부관리자</span><label class="tsw"><input type="checkbox" ${u.isSubAdmin?'checked':''} onchange="setSubAdmin('${u.id}',this.checked)"><span class="tsl"></span></label></div></div>`).join('');
  document.getElementById('prcontent').innerHTML=`<div class="phdr" style="background:var(--d);"><button class="bkbtn" onclick="goProfile('admin')">‹</button><span class="phdr-t">관리자 설정</span></div><div class="asec"><div class="acard"><div class="actitle">⚙️ 이용자 목록 (${users.length}명)</div>${rows||'<div style="font-size:12px;color:var(--ts);">가입자 없음</div>'}</div></div>`;
}
async function setSubAdmin(uid,val){ const u=await getU(uid); if(!u) return; u.isSubAdmin=val; await setU(u); toast(val?`${uid} 부관리자 지정`:`${uid} 부관리자 해제`); }
async function openSusMod(uid){ susTgt=uid; const u=await getU(uid); document.getElementById('sus-info').textContent=`대상: ${uid} (${u?u.nickname:''})`; OM('m-sus'); }
async function doSuspend(type){
  if(!susTgt) return; const u=await getU(susTgt); if(!u) return;
  if(type==='perm'){u.suspended={type:'perm'};toast(`${susTgt} 영구정지`);}
  else if(type==='days'){const d=parseInt(document.getElementById('sus-days').value);if(!d||d<1){toast('일수를 입력하세요');return;}u.suspended={type:'days',until:Date.now()+d*86400000};toast(`${susTgt} ${d}일 정지`);}
  else{u.suspended=null;toast(`${susTgt} 정지 해제`);}
  await setU(u); CM('m-sus'); await renderProfile(susTgt);
}

// ===== BADGE =====
async function openBadgeMod(uid){ document.getElementById('badge-uid').textContent=uid; const u=await getU(uid); document.getElementById('badge-inp').value=u?.badge||''; OM('m-badge'); }
async function saveBadge(){ const uid=document.getElementById('badge-uid').textContent; const b=document.getElementById('badge-inp').value.trim(); if(!b){toast('배지 내용을 입력하세요');return;} const u=await getU(uid); if(!u) return; u.badge=b; await setU(u); CM('m-badge'); await renderProfile(uid); toast(`${uid}에게 인증배지를 부여했습니다.`); }
async function removeBadge(){ const uid=document.getElementById('badge-uid').textContent; const u=await getU(uid); if(!u) return; delete u.badge; await setU(u); CM('m-badge'); await renderProfile(uid); toast('인증배지를 제거했습니다.'); }

// ===== POST INFO =====
async function showPInfo(pid){ const p=await getP(pid); if(!p) return; const ts=p.createdAt?.seconds?p.createdAt.seconds*1000:p.createdAt; document.getElementById('pinfo-cont').innerHTML=`<div class="piitem"><div class="pilabel">⏰ 작성 시간</div><div class="pival">${fmtDateFull(ts)}</div></div><div class="piitem"><div class="pilabel">🌐 브라우저</div><div class="pival">${esc(p.browser||'알 수 없음')}</div></div><div class="piitem"><div class="pilabel">📡 IP (앞 2단락)</div><div class="pival">${esc(p.ip||'알 수 없음')}</div></div><div class="piitem"><div class="pilabel">👤 작성자</div><div class="pival">${esc(p.authorId)}</div></div>`; OM('m-pinfo'); }

// ===== NOTIFICATIONS =====
function toggleNP(){ const p=document.getElementById('npanel'); p.classList.toggle('open'); if(p.classList.contains('open')) renderNP(); }
function renderNP(){ const ns=getNs(); const upd=ns.map(n=>({...n,u:false})); setNs(upd); updNBadge(); const el=document.getElementById('nlist'); if(!ns.length){el.innerHTML='<div class="empty" style="padding:18px;"><div class="icon" style="font-size:26px;">🔔</div><p>새로운 알림이 없습니다</p></div>';return;} el.innerHTML=ns.map(n=>`<div class="nitem ${n.u?'unread':''}"><div class="nitem-icon">${n.icon||'🔔'}</div><div class="nitem-body"><div class="nitem-text">${n.text}</div><div class="nitem-time">${fmtDate(n.t)}</div></div></div>`).join(''); }
function clearNotifs(){ setNs([]); updNBadge(); renderNP(); }

// ===== UTILS =====
function cc(el,cid){ const l=el.value.length; const e=document.getElementById(cid); e.textContent=`${l} / 100`; e.className='ccount'+(l>90?' warn':''); }
function arta(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

// ===== EVENTS =====
window.addEventListener('click',e=>{
  if(e.target.classList.contains('moverlay')) CM(e.target.id);
  if(!e.target.closest('.pmore')) document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open'));
  if(!e.target.closest('#npanel')&&!e.target.closest('#nbtn')) document.getElementById('npanel').classList.remove('open');
});

// ===== INIT =====
window.addEventListener('load', async ()=>{
  await getU('admin'); // ensure admin doc exists
  const posts=await getAllPosts();
  if(!posts.length){ await setP({id:gid(),authorId:'admin',content:'MIRAMIRA에 오신 것을 환영합니다! 💜\n게시물을 올려 사람들과 소통해보세요.',createdAt:Date.now()-3600000,likes:[],dislikes:[],retweets:[],comments:[],browser:'Chrome',ip:'000.000'}); }
  const saved=localStorage.getItem('mm_cur');
  if(saved){ CU=await getU(saved); if(CU){await enterApp();return;} }
  showScr('auth'); document.getElementById('bnav').style.display='none';
});

// ===== EXPOSE ALL to window =====
Object.assign(window,{
  switchTab,doLogin,doRegister,doLogout,navTo,goProfile,
  openUpload,openPostM,openStoryM,prevStory,submitPost,submitStory,
  viewStory,closeSTV,storySkip,
  toggleCm,toggleDD,doLike,doDislike,doRetweet,editPost,delPost,
  submitCm,editCm,delCm,cmLike,cmDislike,cmRetweet,
  doSearch,scrollToPost,
  renderProfile,doFollow,showFL,
  openPE,prevPfp,savePE,
  openAdmin,setSubAdmin,openSusMod,doSuspend,
  openBadgeMod,saveBadge,removeBadge,
  showPInfo,toggleNP,clearNotifs,
  OM,CM,cc,arta
});
</script>
