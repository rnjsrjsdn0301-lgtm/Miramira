<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRAMIRA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #7B5EA7;
  --primary-dark: #5C3D8F;
  --primary-light: #A688D4;
  --primary-bg: #F3EEF9;
  --primary-soft: #EDE5F7;
  --accent: #C084FC;
  --danger: #EF4444;
  --success: #22C55E;
  --text: #1e1e2e;
  --text-secondary: #6b6b8a;
  --border: #DDD6F3;
  --white: #ffffff;
  --card-bg: #ffffff;
  --bg: #F8F5FC;
  --story-gradient: linear-gradient(135deg, #7B5EA7, #C084FC);
  --shadow: 0 2px 16px rgba(123,94,167,0.10);
  --shadow-lg: 0 8px 32px rgba(123,94,167,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
input,textarea,button,select { font-family:'Noto Sans KR',sans-serif; }

/* ===== SCREENS ===== */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ===== AUTH ===== */
#auth-screen {
  background: linear-gradient(160deg, var(--primary-bg) 0%, #fff 60%, var(--primary-soft) 100%);
  align-items:center; justify-content:center; padding:24px;
}
.auth-box { width:100%; max-width:420px; }
.logo-wrap { text-align:center; margin-bottom:36px; }
.logo-wrap img { height:52px; }
.auth-tabs { display:flex; background:var(--primary-soft); border-radius:14px; padding:4px; margin-bottom:24px; }
.auth-tab { flex:1; padding:10px; text-align:center; border-radius:10px; cursor:pointer; font-weight:700; font-size:14px; color:var(--primary); transition:.2s; }
.auth-tab.active { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(123,94,167,.25); }
.auth-form { display:none; flex-direction:column; gap:14px; }
.auth-form.active { display:flex; }
.input-group { display:flex; flex-direction:column; gap:6px; }
.input-group label { font-size:12px; font-weight:700; color:var(--primary-dark); letter-spacing:.5px; }
.input-group input { padding:12px 16px; border:2px solid var(--border); border-radius:12px; font-size:14px; transition:.2s; background:#fff; }
.input-group input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(123,94,167,.12); }
.btn-primary { background:var(--primary); color:#fff; border:none; padding:14px; border-radius:12px; font-weight:800; font-size:15px; cursor:pointer; transition:.2s; letter-spacing:.3px; }
.btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); box-shadow:var(--shadow); }
.auth-err { color:var(--danger); font-size:13px; text-align:center; min-height:18px; }

/* ===== MAIN LAYOUT ===== */
#main-screen { padding-bottom:70px; }
.topbar { position:sticky; top:0; z-index:100; background:rgba(255,255,255,.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:12px 16px; }
.topbar-logo img { height:32px; }
.topbar-actions { display:flex; gap:8px; align-items:center; }

/* ===== STORIES ===== */
.stories-wrap { padding:16px 0 8px; overflow-x:auto; display:flex; gap:12px; padding-left:16px; scrollbar-width:none; }
.stories-wrap::-webkit-scrollbar { display:none; }
.story-item { display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; flex-shrink:0; }
.story-ring { width:60px; height:60px; border-radius:50%; background:var(--story-gradient); padding:3px; }
.story-ring.empty { background:var(--border); }
.story-avatar { width:100%; height:100%; border-radius:50%; border:2px solid #fff; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; color:var(--primary); overflow:hidden; }
.story-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.story-name { font-size:11px; color:var(--text-secondary); max-width:64px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.add-story-btn { width:60px; height:60px; border-radius:50%; background:var(--primary-soft); border:2px dashed var(--primary-light); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:24px; color:var(--primary); transition:.2s; }
.add-story-btn:hover { background:var(--primary-bg); }

/* ===== FEED ===== */
.feed { padding:8px 12px; display:flex; flex-direction:column; gap:12px; }
.post-card { background:var(--card-bg); border-radius:16px; padding:16px; box-shadow:var(--shadow); border:1px solid var(--border); }
.post-card.deleted-admin { border-color:#fca5a5; background:#fff5f5; }
.post-card.retweeted { border-left:3px solid var(--primary-light); }
.post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.post-avatar { width:40px; height:40px; border-radius:50%; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--primary); cursor:pointer; flex-shrink:0; overflow:hidden; }
.post-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.post-meta { flex:1; }
.post-userid { font-weight:700; font-size:14px; color:var(--primary-dark); cursor:pointer; }
.post-userid:hover { text-decoration:underline; }
.post-date { font-size:11px; color:var(--text-secondary); }
.post-more { position:relative; }
.more-btn { background:none; border:none; cursor:pointer; color:var(--text-secondary); font-size:18px; padding:4px; border-radius:6px; }
.more-btn:hover { background:var(--primary-soft); color:var(--primary); }
.dropdown { display:none; position:absolute; right:0; top:100%; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-lg); z-index:50; min-width:130px; overflow:hidden; }
.dropdown.open { display:block; }
.dropdown-item { padding:10px 16px; font-size:13px; cursor:pointer; white-space:nowrap; }
.dropdown-item:hover { background:var(--primary-soft); color:var(--primary); }
.dropdown-item.danger { color:var(--danger); }
.post-content { font-size:14px; line-height:1.65; color:var(--text); margin-bottom:12px; white-space:pre-wrap; }
.post-content.admin-deleted { color:var(--danger); font-weight:700; font-size:13px; }
.retweet-info { font-size:11px; color:var(--primary-light); margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.post-actions { display:flex; gap:0; border-top:1px solid var(--border); margin-top:8px; padding-top:8px; }
.action-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px 4px; border:none; background:none; cursor:pointer; font-size:12px; color:var(--text-secondary); border-radius:8px; transition:.15s; font-weight:600; }
.action-btn:hover { background:var(--primary-soft); color:var(--primary); }
.action-btn.active-like { color:#E91E8C; }
.action-btn.active-dislike { color:var(--danger); }
.action-btn.active-retweet { color:var(--primary); }
.action-btn svg { width:16px; height:16px; flex-shrink:0; }

/* ===== BOTTOM NAV ===== */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,.97); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:none; z-index:100; padding:4px 0 6px; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:8px; border:none; background:none; cursor:pointer; color:var(--text-secondary); font-size:10px; font-weight:700; transition:.15s; }
.nav-btn.active { color:var(--primary); }
.nav-btn svg { width:24px; height:24px; }
.nav-btn.upload-btn { background:var(--primary); border-radius:16px; color:#fff; margin:2px 8px; }
.nav-btn.upload-btn svg { width:22px; height:22px; }

/* ===== SEARCH ===== */
#search-screen { padding:0; }
.search-header { padding:16px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.search-input-wrap { position:relative; }
.search-input-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-secondary); width:18px; height:18px; }
.search-input { width:100%; padding:12px 16px 12px 44px; border:2px solid var(--border); border-radius:12px; font-size:14px; background:var(--bg); }
.search-input:focus { outline:none; border-color:var(--primary); background:#fff; }
.search-results { padding:12px; display:flex; flex-direction:column; gap:10px; }
.search-section-title { font-size:12px; font-weight:800; color:var(--primary); letter-spacing:.5px; margin:8px 0 4px; }
.user-result-item { display:flex; align-items:center; gap:12px; padding:12px; background:#fff; border-radius:12px; border:1px solid var(--border); cursor:pointer; }
.user-result-item:hover { border-color:var(--primary-light); }

/* ===== PROFILE ===== */
#profile-screen { overflow-y:auto; }
.profile-header { background:var(--primary); padding:24px 16px 16px; color:#fff; }
.profile-cover-row { display:flex; align-items:flex-end; gap:16px; margin-bottom:12px; }
.profile-pic-wrap { position:relative; }
.profile-pic { width:80px; height:80px; border-radius:50%; border:3px solid rgba(255,255,255,.6); background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:800; color:#fff; overflow:hidden; cursor:pointer; }
.profile-pic img { width:100%; height:100%; object-fit:cover; }
.profile-pic-edit-hint { font-size:10px; text-align:center; margin-top:4px; opacity:.7; }
.profile-stats { display:flex; gap:20px; flex:1; justify-content:flex-end; }
.profile-stat { text-align:center; cursor:pointer; }
.profile-stat-num { font-size:20px; font-weight:800; }
.profile-stat-label { font-size:11px; opacity:.8; }
.profile-userid { font-size:18px; font-weight:800; }
.profile-nickname { font-size:14px; opacity:.85; margin-top:2px; }
.profile-bio { font-size:13px; opacity:.8; margin-top:6px; line-height:1.5; }
.profile-actions-row { display:flex; gap:8px; padding:12px 16px; background:#fff; border-bottom:1px solid var(--border); }
.btn-outline { background:none; border:2px solid var(--primary); color:var(--primary); padding:8px 16px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; transition:.2s; }
.btn-outline:hover { background:var(--primary-soft); }
.btn-danger-outline { background:none; border:2px solid var(--danger); color:var(--danger); padding:8px 16px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; }
.btn-follow { background:var(--primary); color:#fff; border:none; padding:8px 20px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; transition:.2s; }
.btn-follow.following { background:#fff; color:var(--primary); border:2px solid var(--primary); }
.profile-posts { padding:12px; display:flex; flex-direction:column; gap:10px; }
.suspended-badge { background:#fef2f2; border:1px solid #fca5a5; color:var(--danger); padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700; }

/* ===== MODALS ===== */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(30,20,50,.5); backdrop-filter:blur(4px); z-index:200; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-overlay.center { align-items:center; padding:16px; }
.modal-box { background:#fff; border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; }
.modal-overlay.center .modal-box { border-radius:20px; }
.modal-title { font-size:16px; font-weight:800; color:var(--primary-dark); margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
.modal-close { background:none; border:none; cursor:pointer; color:var(--text-secondary); font-size:22px; line-height:1; }
.modal-close:hover { color:var(--text); }
.upload-type-btns { display:flex; gap:12px; }
.upload-type-btn { flex:1; padding:20px; border:2px solid var(--border); border-radius:14px; background:#fff; cursor:pointer; text-align:center; transition:.2s; }
.upload-type-btn:hover { border-color:var(--primary); background:var(--primary-soft); }
.upload-type-btn .icon { font-size:32px; margin-bottom:8px; }
.upload-type-btn .label { font-weight:700; font-size:14px; color:var(--primary-dark); }
textarea.modal-textarea { width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:12px; font-size:14px; resize:none; min-height:100px; transition:.2s; }
textarea.modal-textarea:focus { outline:none; border-color:var(--primary); }
.char-count { text-align:right; font-size:12px; color:var(--text-secondary); margin-top:4px; }
.char-count.warn { color:var(--danger); }
.modal-actions { display:flex; gap:10px; margin-top:16px; }
.modal-actions .btn-primary { flex:1; }
.btn-secondary { background:var(--bg); color:var(--text-secondary); border:none; padding:12px; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; }

/* ===== STORY VIEWER ===== */
.story-viewer { display:none; position:fixed; inset:0; background:#000; z-index:300; flex-direction:column; }
.story-viewer.open { display:flex; }
.story-progress-bars { display:flex; gap:4px; padding:10px 12px 6px; }
.story-progress-bar { flex:1; height:3px; background:rgba(255,255,255,.3); border-radius:2px; overflow:hidden; }
.story-progress-fill { height:100%; background:#fff; width:0%; transition:width 5s linear; }
.story-viewer-header { display:flex; align-items:center; gap:10px; padding:8px 12px; }
.story-viewer-avatar { width:36px; height:36px; border-radius:50%; border:2px solid #fff; overflow:hidden; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--primary); }
.story-viewer-avatar img { width:100%; height:100%; object-fit:cover; }
.story-viewer-name { color:#fff; font-weight:700; font-size:14px; flex:1; }
.story-viewer-time { color:rgba(255,255,255,.7); font-size:12px; }
.story-close-btn { color:#fff; background:none; border:none; font-size:24px; cursor:pointer; }
.story-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:10px; }
.story-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; border-radius:8px; }

/* ===== COMMENTS ===== */
.comments-section { margin-top:12px; border-top:1px solid var(--border); padding-top:10px; display:flex; flex-direction:column; gap:8px; }
.comment-card { background:var(--primary-bg); border-radius:10px; padding:10px 12px; }
.comment-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.comment-avatar { width:28px; height:28px; border-radius:50%; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--primary); cursor:pointer; overflow:hidden; flex-shrink:0; }
.comment-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.comment-userid { font-weight:700; font-size:12px; color:var(--primary-dark); cursor:pointer; }
.comment-userid:hover { text-decoration:underline; }
.comment-date { font-size:10px; color:var(--text-secondary); margin-left:auto; }
.comment-content { font-size:13px; line-height:1.55; white-space:pre-wrap; }
.comment-actions { display:flex; gap:8px; margin-top:6px; }
.comment-action-btn { background:none; border:none; font-size:11px; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; gap:3px; padding:3px 6px; border-radius:6px; font-weight:600; }
.comment-action-btn:hover { background:rgba(123,94,167,.1); color:var(--primary); }
.comment-action-btn.active-like { color:#E91E8C; }
.comment-action-btn.active-dislike { color:var(--danger); }
.comment-input-row { display:flex; gap:8px; align-items:flex-end; }
.comment-input { flex:1; padding:10px 12px; border:2px solid var(--border); border-radius:10px; font-size:13px; resize:none; min-height:38px; max-height:80px; transition:.2s; }
.comment-input:focus { outline:none; border-color:var(--primary); }
.comment-submit { background:var(--primary); color:#fff; border:none; padding:8px 14px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; }
.toggle-comments-btn { background:none; border:none; color:var(--primary); font-size:12px; font-weight:700; cursor:pointer; padding:4px 0; margin-top:2px; }

/* ===== ADMIN ===== */
.admin-section { padding:12px 16px; }
.admin-card { background:#fff; border-radius:14px; border:2px solid #fca5a5; padding:16px; margin-bottom:12px; }
.admin-card-title { font-size:14px; font-weight:800; color:var(--danger); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.user-admin-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.user-admin-row:last-child { border-bottom:none; }
.user-admin-info { font-size:13px; }
.user-admin-id { font-weight:700; }
.user-admin-pw { color:var(--text-secondary); font-size:12px; }
.sub-admin-toggle { display:flex; align-items:center; gap:8px; }
.toggle-switch { position:relative; width:40px; height:22px; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#ccc; border-radius:22px; cursor:pointer; transition:.2s; }
.toggle-slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle-switch input:checked + .toggle-slider { background:var(--primary); }
.toggle-switch input:checked + .toggle-slider:before { transform:translateX(18px); }

/* ===== SUSPENSION MODAL ===== */
.suspension-options { display:flex; flex-direction:column; gap:8px; }
.suspension-option { padding:12px; border:2px solid var(--border); border-radius:10px; cursor:pointer; font-weight:600; font-size:14px; text-align:center; transition:.15s; }
.suspension-option:hover { border-color:var(--danger); color:var(--danger); background:#fff5f5; }
.suspension-days-input { display:flex; gap:8px; align-items:center; }
.suspension-days-input input { flex:1; padding:10px; border:2px solid var(--border); border-radius:10px; font-size:14px; }

/* ===== MISC ===== */
.empty-state { text-align:center; padding:40px 20px; color:var(--text-secondary); }
.empty-state .icon { font-size:40px; margin-bottom:8px; }
.empty-state p { font-size:14px; }
.back-btn { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:4px; }
.page-header { display:flex; align-items:center; gap:10px; padding:14px 16px; background:var(--primary); color:#fff; }
.page-header-title { font-weight:800; font-size:16px; }
.followers-list { padding:12px; display:flex; flex-direction:column; gap:8px; }
.follower-item { display:flex; align-items:center; gap:12px; padding:12px; background:#fff; border-radius:12px; border:1px solid var(--border); cursor:pointer; }
.follower-item:hover { border-color:var(--primary-light); }
.follower-item-avatar { width:44px; height:44px; border-radius:50%; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--primary); overflow:hidden; }
.follower-item-avatar img { width:100%; height:100%; object-fit:cover; }
.follower-item-info { flex:1; }
.follower-item-id { font-weight:700; font-size:14px; }
.follower-item-nick { font-size:12px; color:var(--text-secondary); }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--primary-dark); color:#fff; padding:10px 20px; border-radius:12px; font-size:13px; font-weight:700; z-index:500; opacity:0; transition:.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.edit-input { width:100%; padding:8px 10px; border:2px solid var(--primary-light); border-radius:8px; font-size:13px; margin-top:4px; }
.edit-input:focus { outline:none; border-color:var(--primary); }
/* ===== NOTIFICATION ===== */
.notif-btn { position:relative; background:none; border:none; cursor:pointer; padding:6px; color:var(--text-secondary); display:flex; align-items:center; }
.notif-btn svg { width:22px; height:22px; }
.notif-badge { position:absolute; top:2px; right:2px; width:8px; height:8px; background:var(--danger); border-radius:50%; border:2px solid #fff; display:none; }
.notif-badge.show { display:block; }
.notif-panel { display:none; position:fixed; top:54px; right:8px; width:320px; max-width:calc(100vw - 16px); background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-lg); z-index:200; max-height:420px; overflow-y:auto; }
.notif-panel.open { display:block; }
.notif-header { padding:14px 16px 8px; font-weight:800; font-size:14px; color:var(--primary-dark); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
.notif-clear { background:none; border:none; font-size:11px; color:var(--text-secondary); cursor:pointer; font-weight:700; }
.notif-clear:hover { color:var(--danger); }
.notif-item { display:flex; align-items:flex-start; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:.15s; }
.notif-item:hover { background:var(--primary-bg); }
.notif-item.unread { background:var(--primary-soft); }
.notif-item-icon { font-size:20px; flex-shrink:0; margin-top:2px; }
.notif-item-body { flex:1; }
.notif-item-text { font-size:13px; line-height:1.45; color:var(--text); }
.notif-item-text strong { color:var(--primary-dark); }
.notif-item-time { font-size:11px; color:var(--text-secondary); margin-top:2px; }
/* ===== POST INFO MODAL ===== */
.post-info-row { display:flex; flex-direction:column; gap:10px; }
.post-info-item { background:var(--primary-bg); border-radius:10px; padding:12px 14px; }
.post-info-label { font-size:11px; font-weight:800; color:var(--primary); letter-spacing:.5px; margin-bottom:4px; }
.post-info-value { font-size:14px; font-weight:600; color:var(--text); }
/* ===== BADGE ===== */
.user-badge { display:inline-flex; align-items:center; font-size:14px; margin-left:4px; cursor:default; }
</style>

<script type="module">
// 최신 안정 버전의 SDK 가져오기
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc,
  collection, getDocs, addDoc, query, orderBy, where, onSnapshot, serverTimestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// 요청한 Firebase 설정값
const firebaseConfig = {
  apiKey: "AIzaSyDIffZz4ImYy9wlUujnirN4jk5ObYp7PNw",
  authDomain: "miramira-9a34c.firebaseapp.com",
  projectId: "miramira-9a34c",
  storageBucket: "miramira-9a34c.firebasestorage.app",
  messagingSenderId: "506476561553",
  appId: "1:506476561553:web:8dbb3b232df753e5536b30"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =============== DATA ===============
const DEFAULT_ADMIN = { id:'admin', password:'admin', nickname:'관리자', bio:'MIRAMIRA 운영자', pfp:'', isAdmin:true, isSubAdmin:false, followers:[], following:[], suspended:null };

// ---- Firebase 헬퍼 ----
async function getUsers() {
  const snap = await getDocs(collection(db, 'users'));
  return snap.docs.map(d => d.data());
}
async function saveUser(u) {
  await setDoc(doc(db, 'users', u.id), u);
}
async function getPosts() {
  const snap = await getDocs(query(collection(db, 'posts'), orderBy('createdAt','desc')));
  return snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
}
async function savePost(p) {
  const { _docId, ...data } = p;
  await setDoc(doc(db, 'posts', p.id), data);
}
async function deletePostDoc(postId) {
  await deleteDoc(doc(db, 'posts', postId));
}
async function getStories() {
  const snap = await getDocs(collection(db, 'stories'));
  return snap.docs.map(d => d.data());
}
async function saveStory(s) {
  await setDoc(doc(db, 'stories', s.id), s);
}
async function deleteStoryDoc(storyId) {
  await deleteDoc(doc(db, 'stories', storyId));
}
let _currentUserId = null;
function getCurrentUserId() { return _currentUserId || localStorage.getItem('mm_current'); }
async function getCurrentUser() {
  const id = getCurrentUserId(); if(!id) return null;
  return await findUser(id);
}
async function findUser(id) {
  if(!id) return null;
  if(id==='admin') return await getAdminUser();
  const snap = await getDoc(doc(db,'users',id));
  return snap.exists() ? snap.data() : null;
}
async function getAdminUser() {
  const snap = await getDoc(doc(db,'users','admin'));
  if(snap.exists()) return snap.data();
  // 최초 1회 기본 관리자 생성
  await setDoc(doc(db,'users','admin'), DEFAULT_ADMIN);
  return DEFAULT_ADMIN;
}
async function updateUser(u) { await setDoc(doc(db,'users',u.id), u); }

async function cleanStories() {
  const now = Date.now();
  const stories = await getStories();
  for(const s of stories) {
    const ts = s.createdAt?.seconds ? s.createdAt.seconds*1000 : s.createdAt;
    if((now - ts) >= 24*60*60*1000) await deleteStoryDoc(s.id);
  }
}

let currentScreen = 'main';
let svTimer = null;
let svCurrentIdx = 0;
let svStories = [];
let suspendTargetId = null;
let editingPostId = null;
let editingCommentInfo = null;
let _cachedUser = null; // 로그인된 유저 캐시 (동기 접근용)

// 동기 접근용 - 캐시에서 바로 반환
function getCU() { return _cachedUser; }
// 캐시 갱신 후 반환
async function loadCurrentUser() {
  const id = getCurrentUserId(); 
  if(!id) { 
    _cachedUser = null; 
    return null; 
  }
  _cachedUser = await findUser(id);
  return _cachedUser;
}

// =============== AUTH ===============
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').classList.toggle('active', tab==='login');
  document.getElementById('register-form').classList.toggle('active', tab==='register');
}
async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent='';
  if(!id||!pw){errEl.textContent='아이디와 비밀번호를 입력하세요.';return;}
  const u = await findUser(id);
  if(!u||u.password!==pw){errEl.textContent='아이디 또는 비밀번호가 틀렸습니다.';return;}
  _currentUserId = id;
  localStorage.setItem('mm_current', id);
  await enterApp();
}
async function doRegister() {
  const id = document.getElementById('reg-id').value.trim();
  const pw = document.getElementById('reg-pw').value;
  const nick = document.getElementById('reg-nick').value.trim();
  const errEl = document.getElementById('reg-err');
  errEl.textContent='';
  if(!id||!pw||!nick){errEl.textContent='모든 항목을 입력하세요.';return;}
  if(id==='admin'){errEl.textContent='사용할 수 없는 아이디입니다.';return;}
  const exists = await findUser(id);
  if(exists){errEl.textContent='이미 사용 중인 아이디입니다.';return;}
  const newUser = { id, password:pw, nickname:nick, bio:'', pfp:'', isAdmin:false, isSubAdmin:false, followers:[], following:[], suspended:null };
  await saveUser(newUser);
  showToast('회원가입 완료! 로그인하세요.');
  switchAuthTab('login');
  document.getElementById('login-id').value=id;
}
function doLogout() {
  _currentUserId = null;
  _cachedUser = null;
  localStorage.removeItem('mm_current');
  showScreen('auth');
  document.getElementById('bottom-nav').style.display='none';
}

// =============== APP ===============
async function enterApp() {
  await cleanStories();
  const cu = await loadCurrentUser();
  if(!cu) {
    doLogout();
    return;
  }
  document.getElementById('topbar-username').textContent = cu ? cu.id : '';
  showScreen('main');
  document.getElementById('bottom-nav').style.display='flex';
  document.getElementById('nav-home').classList.add('active');
  await renderFeed();
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name+'-screen').classList.add('active');
  currentScreen = name;
}
async function navTo(name) {
  document.querySelectorAll('.nav-btn:not(.upload-btn)').forEach(b=>b.classList.remove('active'));
  if(name==='main'){document.getElementById('nav-home').classList.add('active'); showScreen('main'); await renderFeed();}
  else if(name==='search'){document.getElementById('nav-search').classList.add('active'); showScreen('search');}
  else if(name==='profile'){document.getElementById('nav-profile').classList.add('active'); const cu=await getCurrentUser(); await renderProfile(cu.id); showScreen('profile');}
}
function goBack() { navTo('main'); }

// =============== FEED ===============
async function renderFeed() {
  await cleanStories();
  await renderStories();
  const cu = await getCurrentUser();
  if(!cu) return;
  let posts = (await getPosts()).filter(p=>!p.isDeleted);
  posts.sort((a,b) => {
    const at = a.createdAt?.seconds ? a.createdAt.seconds*1000 : a.createdAt;
    const bt = b.createdAt?.seconds ? b.createdAt.seconds*1000 : b.createdAt;
    const aFollow = cu.following && cu.following.includes(a.authorId) ? 1 : 0;
    const bFollow = cu.following && cu.following.includes(b.authorId) ? 1 : 0;
    if(bFollow!==aFollow) return bFollow-aFollow;
    return bt - at;
  });
  const feed = document.getElementById('feed-container');
  if(!posts.length){feed.innerHTML='<div class="empty-state"><div class="icon">✨</div><p>아직 게시물이 없어요</p></div>';return;}
  feed.innerHTML = (await Promise.all(posts.map(p=>renderPostHTML(p)))).join('');
}

async function renderStories() {
  await cleanStories();
  const cu = await getCurrentUser();
  if(!cu) return;
  const stories = await getStories();
  const container = document.getElementById('stories-container');
  const byUser = {};
  stories.forEach(s=>{ if(!byUser[s.authorId]) byUser[s.authorId]=[]; byUser[s.authorId].push(s); });
  let html = `<div class="story-item"><div class="add-story-btn" onclick="openStoryModal()">+</div><div class="story-name">내 스토리</div></div>`;
  const ordered = Object.keys(byUser).sort((a,b)=>{
    const af = cu.following&&cu.following.includes(a)?1:0;
    const bf = cu.following&&cu.following.includes(b)?1:0;
    return bf-af;
  });
  for(const uid of ordered) {
    const u = await findUser(uid); if(!u) continue;
    const initials=u.id.substring(0,2).toUpperCase();
    const pfpHtml = u.pfp ? `<img src="${u.pfp}" alt="">` : initials;
    html += `<div class="story-item" onclick="viewStory('${uid}')">
      <div class="story-ring"><div class="story-avatar">${pfpHtml}</div></div>
      <div class="story-name">${u.id}</div>
    </div>`;
  }
  container.innerHTML=html;
}

// =============== POST ACTIONS ===============
function toggleComments(postId) {
  const el = document.getElementById('comments-'+postId);
  if(el) { el.style.display = el.style.display==='none'?'flex':'none'; if(el.style.display==='flex') el.style.flexDirection='column'; }
}
async function likePost(postId) {
  const cu = await getCurrentUser();
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  p.likes = p.likes||[];
  p.dislikes = p.dislikes||[];
  const wasLiked = p.likes.includes(cu.id);
  if(wasLiked) p.likes=p.likes.filter(x=>x!==cu.id);
  else { p.likes.push(cu.id); p.dislikes=p.dislikes.filter(x=>x!==cu.id); }
  await savePost(p);
  if(!wasLiked && p.authorId!==cu.id) await notifyPostActivity(p, cu.id, 'like');
  await refreshPost(postId);
}
async function dislikePost(postId) {
  const cu = await getCurrentUser();
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  p.dislikes = p.dislikes||[];
  p.likes = p.likes||[];
  const wasDisliked = p.dislikes.includes(cu.id);
  if(wasDisliked) p.dislikes=p.dislikes.filter(x=>x!==cu.id);
  else { p.dislikes.push(cu.id); p.likes=p.likes.filter(x=>x!==cu.id); }
  await savePost(p);
  if(!wasDisliked && p.authorId!==cu.id) await notifyPostActivity(p, cu.id, 'dislike');
  await refreshPost(postId);
}
async function retweetPost(postId) {
  const cu = await getCurrentUser();
  let posts = await getPosts();
  const pIdx = posts.findIndex(p=>p.id===postId); if(pIdx<0) return;
  posts[pIdx].retweets = posts[pIdx].retweets||[];

  if(posts[pIdx].retweets.includes(cu.id)) {
    posts[pIdx].retweets = posts[pIdx].retweets.filter(x=>x!==cu.id);
    await savePost(posts[pIdx]);
    // 내 리트윗 게시물 삭제
    const myRt = posts.find(rp=>rp.retweetOf===postId && rp.authorId===cu.id);
    if(myRt) await deletePostDoc(myRt.id);
    if(currentScreen==='main') await renderFeed();
    else if(currentScreen==='profile') await renderProfile(cu.id);
    showToast('리트윗을 취소했습니다.');
    return;
  }

  // 리트윗
  posts[pIdx].retweets.push(cu.id);
  await savePost(posts[pIdx]);
  const rp = { id:genId(), authorId:cu.id, content:posts[pIdx].content, createdAt:Date.now(), likes:[], dislikes:[], retweets:[], comments:[], retweetOf:postId, browser:getBrowserName(), ip:'비공개' };
  await savePost(rp);
  await notifyPostActivity(posts[pIdx], cu.id, 'retweet');
  if(currentScreen==='main') await renderFeed();
  else if(currentScreen==='profile') await renderProfile(cu.id);
  showToast('리트윗했습니다!');
}
async function editPost(postId) {
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  document.getElementById('post-text').value = p.content;
  updateCharCount(document.getElementById('post-text'), 'post-char');
  document.getElementById('post-edit-id').textContent = postId;
  editingPostId = postId;
  document.querySelector('#modal-post .modal-title').innerHTML = '게시물 수정 <button class="modal-close" onclick="closeModal(\'modal-post\')">×</button>';
  openModal('modal-post');
}
async function deletePost(postId, isAdminDel) {
  const posts = await getPosts();
  const idx = posts.findIndex(p=>p.id===postId); if(idx<0) return;
  if(isAdminDel) {
    posts[idx].adminDeleted=true; posts[idx].content='[관리자 삭제]';
    await savePost(posts[idx]);
    await refreshPost(postId);
    showToast('관리자가 게시물을 삭제했습니다.');
  } else {
    await deletePostDoc(postId);
    // 리트윗 게시물도 삭제
    for(const p of posts) { if(p.retweetOf===postId) await deletePostDoc(p.id); }
    const el = document.getElementById('post-'+postId);
    if(el) el.remove();
    if(currentScreen==='main') await renderFeed();
    else if(currentScreen==='profile') { await renderProfile(getCU().id); }
    showToast('게시물이 삭제되었습니다.');
  }
}
async function submitComment(postId) {
  const cu = await getCurrentUser();
  if(isSuspended(cu)){showToast('정지된 계정입니다.');return;}
  const input = document.getElementById('ci-'+postId);
  const text = input.value.trim();
  if(!text) return;
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  if(editingCommentInfo && editingCommentInfo.postId===postId) {
    const c = p.comments.find(c=>c.id===editingCommentInfo.commentId);
    if(c) { c.content=text; c.edited=true; }
    await savePost(p); await refreshPost(postId); editingCommentInfo=null; input.value='';
    showToast('댓글이 수정되었습니다.');
    return;
  }
  const comment = { id:genId(), authorId:cu.id, content:text, createdAt:Date.now(), likes:[], dislikes:[], retweets:[] };
  p.comments = p.comments||[];
  p.comments.push(comment);
  await savePost(p);
  if(p.authorId !== cu.id) await notifyPostActivity(p, cu.id, 'comment');
  input.value='';
  await refreshPost(postId);
}
async function editComment(postId, commentId) {
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId);
  const c = p&&p.comments.find(c=>c.id===commentId);
  if(!c) return;
  const input = document.getElementById('ci-'+postId);
  if(!input){showToast('댓글창을 열어주세요.');toggleComments(postId);setTimeout(()=>editComment(postId,commentId),200);return;}
  input.value = c.content;
  editingCommentInfo = {postId, commentId};
}
async function deleteComment(postId, commentId, isAdminDel) {
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  if(isAdminDel) { const c=p.comments.find(c=>c.id===commentId); if(c){c.adminDeleted=true;c.content='[관리자 삭제]';} }
  else { p.comments=p.comments.filter(c=>c.id!==commentId); }
  await savePost(p); await refreshPost(postId);
}

  else{c.likes.push(cu.id);c.dislikes=c.dislikes.filter(x=>x!==cu.id);}

async function dislikeComment(postId, commentId) {
  const cu = getCU();
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  const c = p.comments.find(c=>c.id===commentId); if(!c) return;
  c.dislikes=c.dislikes||[]; c.likes=c.likes||[];
  if(c.dislikes.includes(cu.id)) c.dislikes=c.dislikes.filter(x=>x!==cu.id);
  else{c.dislikes.push(cu.id);c.likes=c.likes.filter(x=>x!==cu.id);}

async function retweetComment(postId, commentId) {
  const cu = getCU();
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId); if(!p) return;
  const c = p.comments.find(c=>c.id===commentId); if(!c) return;

async function refreshPost(postId) {
  const posts = await getPosts();
  const p = posts.find(p=>p.id===postId);
  const el = document.getElementById('post-'+postId);
  if(el&&p) {
    const wasOpen = document.getElementById('comments-'+postId)&&document.getElementById('comments-'+postId).style.display!=='none';

    if(wasOpen) { const cs=document.getElementById('comments-'+postId); if(cs)cs.style.display='flex'; }
  }

async function submitPost() {

  const text = document.getElementById('post-text').value.trim();

  if(text.length>100){showToast('100자를 초과할 수 없습니다.');return;}

// =============== STORY VIEWER ===============
async function viewStory(uid) {
  await cleanStories();
  const stories = (await getStories()).filter(s=>s.authorId===uid);
  if(!stories.length){showToast('스토리가 없습니다.');return;}
  svStories=stories; svCurrentIdx=0;
  await showStoryAt(0);
  document.getElementById('story-viewer').classList.add('open');
}
async function showStoryAt(idx) {
  const s = svStories[idx];
  const targetUser = await findUser(s.authorId);
  const initials = s.authorId.substring(0,2).toUpperCase();
  const sv = document.getElementById('sv-avatar');
  
  if (targetUser && targetUser.pfp) {
    sv.innerHTML = `<img src="${targetUser.pfp}" alt="">`;
  } else {
    sv.innerHTML = initials;
  }
  
  document.getElementById('sv-name').textContent = s.authorId;
  document.getElementById('sv-time').textContent = formatDate(s.createdAt?.seconds ? s.createdAt.seconds*1000 : s.createdAt);
  document.getElementById('sv-img').src = s.image;
  // Progress bars
  const bars = document.getElementById('story-progress-bars');
  bars.innerHTML = svStories.map((_,i)=>`<div class="story-progress-bar"><div class="story-progress-fill" id="spf-${i}"></div></div>`).join('');
  // Fill previous
  for(let i=0;i<idx;i++) { const f=document.getElementById('spf-'+i); if(f)f.style.width='100%'; }
  if(svTimer) clearInterval(svTimer);
  const fill = document.getElementById('spf-'+idx);
  let pct=0;
  svTimer = setInterval(()=>{
    pct+=1;
    if(fill)fill.style.width=pct+'%';
    if(pct>=100){clearInterval(svTimer); svCurrentIdx++; if(svCurrentIdx<svStories.length)showStoryAt(svCurrentIdx); else closeStoryViewer();}
  },50);
}
function closeStoryViewer() {
  if(svTimer) clearInterval(svTimer);
  document.getElementById('story-viewer').classList.remove('open');
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const res = document.getElementById('search-results');
  if(!q){res.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>검색어를 입력하세요</p></div>';return;}
  const users = await getUsers();
  const admin = await getAdminUser();
  const allUsers = [admin,...users];
  const matchUsers = allUsers.filter(u=>u.id.toLowerCase().includes(q)||(u.nickname||'').toLowerCase().includes(q));
  const posts = (await getPosts()).filter(p=>!p.adminDeleted&&!p.isDeleted&&p.content&&p.content.toLowerCase().includes(q));
  let html='';
  if(matchUsers.length){
    html+=`<div class="search-section-title">👤 사용자</div>`;
    html+=matchUsers.map(u=>{
      const initials=u.id.substring(0,2).toUpperCase();
      const pfpHtml=u.pfp?`<img src="${u.pfp}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`:
        `<div style="width:44px;height:44px;border-radius:50%;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--primary);">${initials}</div>`;
      return `<div class="user-result-item" onclick="goToProfile('${u.id}')">
        ${pfpHtml}
        <div><div style="font-weight:700;font-size:14px;">${escHtml(u.id)}</div><div style="font-size:12px;color:var(--text-secondary);">${escHtml(u.nickname)}</div></div>
      </div>`;
    }).join('');
  }
  if(posts.length){
    html+=`<div class="search-section-title">📝 게시물</div>`;
    html+=(await Promise.all(posts.map(p=>renderPostHTML(p)))).join('');
  }
  if(!matchUsers.length&&!posts.length) html='<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>';
  res.innerHTML=html;
}

// =============== PROFILE ===============
async function renderProfile(uid) {
  const cu = getCU();
  if(!cu) return;
  const u = await findUser(uid);
  if(!u){document.getElementById('profile-content').innerHTML='<div class="empty-state"><p>사용자를 찾을 수 없습니다</p></div>';return;}
  const isSelf = cu.id===uid;
  const isAdminViewing = cu.isAdmin||cu.isSubAdmin;
  const initials = uid.substring(0,2).toUpperCase();
  const pfpHtml = u.pfp ? `<img src="${u.pfp}" alt="" id="profile-pfp-img">` : initials;
  const followers = u.followers||[];
  const following = u.following||[];
  const isFollowing = cu.following&&cu.following.includes(uid);
  const suspended = u.suspended;
  let suspBadge='';
  if(suspended) {
    if(suspended.type==='permanent') suspBadge=`<div class="suspended-badge">🚫 영구정지</div>`;
    else if(suspended.type==='days'&&Date.now()<suspended.until) suspBadge=`<div class="suspended-badge">⏸ ${Math.ceil((suspended.until-Date.now())/86400000)}일 정지 중</div>`;
  }

  let actionsRow='';
  if(isSelf){
    actionsRow=`<div class="profile-actions-row">
      <button class="btn-outline" onclick="openProfileEdit()">프로필 수정</button>
      ${cu.isAdmin?`<button class="btn-primary" onclick="openAdminPanel()">관리자설정</button>`:''}
      <button class="btn-outline" onclick="doLogout()" style="margin-left:auto;">로그아웃</button>
    </div>`;
  } else {
    let adminBtns = '';
    if(isAdminViewing) adminBtns=`
      <button class="btn-danger-outline" onclick="openSuspendModal('${uid}')">정지 설정</button>
      <button class="btn-outline" onclick="openBadgeModal('${uid}')">🏅 인증배지</button>`;
    actionsRow=`<div class="profile-actions-row">
      <button class="btn-follow ${isFollowing?'following':''}" onclick="toggleFollow('${uid}')">${isFollowing?'팔로잉':'팔로우'}</button>
      ${adminBtns}
    </div>`;
  }

  const badgeHtml = u.badge ? `<span class="user-badge">${escHtml(u.badge)}</span>` : '';
  const posts = (await getPosts()).filter(p=>p.authorId===uid&&!p.isDeleted&&!p.adminDeleted);
  const postsHtml = posts.length ? (await Promise.all(posts.map(p=>renderPostHTML(p,true)))).join('') : '<div class="empty-state"><div class="icon">📝</div><p>게시물이 없습니다</p></div>';

  document.getElementById('profile-content').innerHTML = `
    <div class="profile-header">
      <div class="profile-cover-row">
        <div class="profile-pic-wrap">
          <div class="profile-pic" onclick="${isSelf?'openProfileEdit()':''}">${pfpHtml}</div>
          ${isSelf?`<div class="profile-pic-edit-hint">탭하여 변경</div>`:''}
        </div>
        <div class="profile-stats">
          <div class="profile-stat" onclick="showFollowList('${uid}','followers')">
            <div class="profile-stat-num">${followers.length}</div>
            <div class="profile-stat-label">팔로워</div>
          </div>
          <div class="profile-stat" onclick="showFollowList('${uid}','following')">
            <div class="profile-stat-num">${following.length}</div>
            <div class="profile-stat-label">팔로잉</div>
          </div>
        </div>
      </div>
      <div class="profile-userid">${escHtml(uid)}${badgeHtml}</div>
      <div class="profile-nickname">${escHtml(u.nickname||'')}</div>
      ${u.bio?`<div class="profile-bio">${escHtml(u.bio)}</div>`:''}
      ${suspBadge}
    </div>
    ${actionsRow}
    <div class="profile-posts">${postsHtml}</div>
  `;
}

async function goToProfile(uid) {
  showScreen('profile');
  document.querySelectorAll('.nav-btn:not(.upload-btn)').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-profile').classList.add('active');

}

async function toggleFollow(uid) {
  const cu = getCU();
  const target = await findUser(uid);
  if(!cu||!target) return;
  cu.following = cu.following||[];
  target.followers = target.followers||[];
  const wasFollowing = cu.following.includes(uid);
  if(wasFollowing){
    cu.following=cu.following.filter(x=>x!==uid);
    target.followers=target.followers.filter(x=>x!==cu.id);
  } else {
    cu.following.push(uid);
    target.followers.push(cu.id);
  }
  _cachedUser = cu;
  await updateUser(cu); await updateUser(target);
  await renderProfile(uid);
  showToast(!wasFollowing?`${uid}을(를) 팔로우했습니다.`:`${uid} 팔로우를 취소했습니다.`);
}

async function showFollowList(uid, type) {
  const u = await findUser(uid);
  if(!u) return;
  const list = type==='followers'?(u.followers||[]):(u.following||[]);
  document.getElementById('follow-list-title').textContent = type==='followers'?'팔로워':'팔로잉';
  const content = document.getElementById('follow-list-content');
  if(!list.length){content.innerHTML='<div class="empty-state"><p>목록이 비어있습니다</p></div>';openModal('modal-follow-list');return;}
  const items = await Promise.all(list.map(async id=>{
    const lu=await findUser(id);
    const initials=id.substring(0,2).toUpperCase();
    const pfpHtml=lu&&lu.pfp?`<img src="${lu.pfp}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`:
      `<div style="width:40px;height:40px;border-radius:50%;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--primary);">${initials}</div>`;
    return `<div class="follower-item" onclick="closeModal('modal-follow-list');goToProfile('${id}')">
      <div class="follower-item-avatar">${pfpHtml}</div>
      <div class="follower-item-info"><div class="follower-item-id">${escHtml(id)}</div><div class="follower-item-nick">${escHtml(lu?lu.nickname:'')}</div></div>
    </div>`;
  }));
  content.innerHTML=items.join('');
  openModal('modal-follow-list');
}

async function doSuspend(type) {
  if(!suspendTargetId) return;
  const u = await findUser(suspendTargetId);
  if(!u) return;
  if(type==='permanent') {
    u.suspended={type:'permanent'};
    showToast(`${suspendTargetId}을(를) 영구정지했습니다.`);
  } else if(type==='days') {
    const days = parseInt(document.getElementById('suspend-days-input').value);
    if(!days||days<1){showToast('일수를 입력하세요.');return;}
    u.suspended={type:'days', until:Date.now()+days*86400000};
    showToast(`${suspendTargetId}을(를) ${days}일 정지했습니다.`);
  } else if(type==='lift') {
    u.suspended=null;
    showToast(`${suspendTargetId}의 정지를 해제했습니다.`);
  }
  await updateUser(u);
  closeModal('modal-suspend');
  await renderProfile(suspendTargetId);
}

function isSuspended(u) {
  if(!u||!u.suspended) return false;
  if(u.suspended.type==='permanent') return true;
  if(u.suspended.type==='days') return Date.now()<u.suspended.until;
  return false;
}

function genId() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function escHtml(str='') { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(ts) {
  const d=new Date(ts); const now=new Date();
  const diff=Date.now()-ts;
  if(diff<60000) return '방금 전';
  if(diff<3600000) return `${Math.floor(diff/60000)}분 전`;
  if(diff<86400000) return `${Math.floor(diff/3600000)}시간 전`;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function pushNotif(targetId, notif) {
  const key = 'mm_notifs_'+targetId;
  const list = JSON.parse(localStorage.getItem(key)||'[]');
  list.unshift({ ...notif, id:genId(), createdAt:Date.now(), unread:true });

  localStorage.setItem(key, JSON.stringify(list));
  if(targetId===getCurrentUserId()) updateNotifBadge();
}

// 알림 발송 헬퍼: 게시물 활동 시 호출
async function notifyPostActivity(post, actionUserId, type) {
  const cu = await getCurrentUser();
  if(!cu) return;
  const actionUser = await findUser(actionUserId);
  const postAuthor = post.authorId;

  const icons = { like:'👍', dislike:'👎', comment:'💬', retweet:'🔁', post:'📝' };
  const texts = {
    like: `<strong>${actionUserId}</strong>님이 회원님의 게시물을 좋아합니다.`,
    dislike: `<strong>${actionUserId}</strong>님이 회원님의 게시물을 싫어합니다.`,
    comment: `<strong>${actionUserId}</strong>님이 회원님의 게시물에 댓글을 달았습니다.`,
    retweet: `<strong>${actionUserId}</strong>님이 회원님의 게시물을 리트윗했습니다.`,
    post: `<strong>${actionUserId}</strong>님이 새 게시물을 올렸습니다.`,
  };

  // 게시물 작성자에게 알림 (자기 자신 제외)
  if(postAuthor !== actionUserId && type !== 'post') {
    await pushNotif(postAuthor, { icon: icons[type], text: texts[type] });
  }

  // 팔로워들에게 알림 (post, retweet)
  if(type === 'post' || type === 'retweet') {
    const actor = await findUser(actionUserId);
    const followers = actor?.followers||[];
    for(const fid of followers) {
      if(fid !== actionUserId) await pushNotif(fid, { icon: icons[type], text: texts[type] });
    }
    // admin 활동은 모든 유저에게
    if(actionUserId === 'admin' && type === 'post') {
      const users = await getUsers();
      for(const u of users) {
        if(u.id !== 'admin') await pushNotif(u.id, { icon:'📢', text:`<strong>관리자</strong>가 새 공지를 올렸습니다.` });
      }
    }
  }
}

  const dateStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  const browser = p.browser || getBrowserName();
  const ip = p.ip || '정보 없음';
  document.getElementById('post-info-content').innerHTML = `
    <div class="post-info-item"><div class="post-info-label">⏰ 작성 시간</div><div class="post-info-value">${dateStr}</div></div>

  `;

}

function getBrowserName() {
  const ua = navigator.userAgent;
  if(ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
  if(ua.includes('Firefox')) return 'Firefox';
  if(ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
  if(ua.includes('Edg')) return 'Edge';
  if(ua.includes('OPR')||ua.includes('Opera')) return 'Opera';
  return '기타';
}
